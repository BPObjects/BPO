/* ============================================================================
   8. EXPORT OBJ / DAE
   Exporte la géométrie courante (FC) vers des fichiers 3D standard.
   - OBJ : format texte universel, géométrie en centimètres
   - DAE : Collada (XML), import natif SketchUp, avec couleur de matériau
   ============================================================================ */

/* dlFile() : déclenche le téléchargement d'un fichier texte généré. */
function xmlEsc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function stepEsc(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"''"); }
function dlFile(name, text, mime){
  var blob=new Blob([text], {type:mime});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download=name;
  document.body.appendChild(a); a.click();
  setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 120);
}

/* Nom de fichier selon l'objet courant */
function curName(){ return MODE==='forme' ? SHAPE : 'meuble'; }

/* exportOBJ() : sommets (v) + normales (vn) + faces (f v//vn).
   Les normales par sommet font que Lumion/Blender affichent une surface LISSE
   sur les formes courbes (sphère, cylindre, cône, tore) au lieu de facettes. */


/* matGroups() : regroupe les faces de FC par couleur+opacité. Retourne une liste
   de matériaux uniques { name, rgb, al, faces:[...] }. Nom lisible si la couleur
   correspond à une finition connue. Sert aux exports multi-matériaux. */
function matGroups(){
  var groups=[], byKey={};
  function knownName(rgb,al){
    if(al<1) return 'porte_verre';     /* verre transparent teinté */
    function eq(c){ return c[0]===rgb[0]&&c[1]===rgb[1]&&c[2]===rgb[2]; }
    if(MODE==='meuble'){
      if(eq(FINISH.corps))   return 'corps';
      if(eq(FINISH.etagere)) return 'etagere';
      if(eq(FINISH.porte))   return 'porte';
    } else {
      if(eq(FINISH.forme)) return 'forme';
    }
    return null;
  }
  var genCount=0;
  for(var i=0;i<FC.length;i++){
    var f=FC[i], c=f.col, al=f.al;
    var key=c[0]+'_'+c[1]+'_'+c[2]+'_'+al;
    if(!byKey[key]){
      var nm=knownName(c,al);
      if(!nm){ nm='couleur_'+(++genCount); }
      var base=nm, k=2; while(groups.some(function(g){return g.name===nm;})){ nm=base+'_'+(k++); }
      byKey[key]={ name:nm, rgb:c, al:al, faces:[] };
      groups.push(byKey[key]);
    }
    byKey[key].faces.push(i);
  }
  return groups;
}

function exportOBJ(){
  build();
  var groups=matGroups();
  var name=curName();

  /* ---- fichier .mtl (matériaux) ---- */
  var M=['# Materiaux - '+name, '# (c) 2026 Antoine Lacronique, architecte'];
  groups.forEach(function(g){
    var r=(g.rgb[0]/255).toFixed(4), gg=(g.rgb[1]/255).toFixed(4), b=(g.rgb[2]/255).toFixed(4);
    M.push('newmtl '+g.name);
    M.push('Kd '+r+' '+gg+' '+b);          /* couleur diffuse */
    M.push('Ka 0.1 0.1 0.1');
    if(g.al<1){ M.push('d '+g.al.toFixed(2)); }   /* transparence (verre) */
    else { M.push('d 1.00'); }
    M.push('illum 2');
  });
  dlFile(name+'.mtl', M.join('\n'), 'text/plain');

  /* ---- fichier .obj (géométrie) ---- */
  var L=['# '+name+' - Meuble parametrique',
         '# (c) 2026 Antoine Lacronique, architecte',
         '# Unites: m',
         'mtllib '+name+'.mtl',           /* référence le fichier matériaux */
         'o '+name];
  /* 1) sommets (dans l'ordre des faces) */
  for(var f=0; f<FC.length; f++){
    var vs=FC[f].verts;
    for(var v=0; v<vs.length; v++){
      L.push('v '+vs[v][0].toFixed(4)+' '+vs[v][1].toFixed(4)+' '+vs[v][2].toFixed(4));
    }
  }
  /* 2) normales */
  for(var f=0; f<FC.length; f++){
    var fa=FC[f], vs=fa.verts;
    for(var v=0; v<vs.length; v++){
      var n = fa.vn ? fa.vn[v] : fa.n;
      L.push('vn '+n[0].toFixed(4)+' '+n[1].toFixed(4)+' '+n[2].toFixed(4));
    }
  }
  /* 3) index de départ de chaque face dans la liste des sommets */
  var faceStart=[], idx=1;
  for(var f=0; f<FC.length; f++){ faceStart[f]=idx; idx+=FC[f].verts.length; }
  /* 4) faces groupées par matériau (usemtl avant chaque groupe) */
  L.push('s 1');
  groups.forEach(function(g){
    L.push('usemtl '+g.name);
    g.faces.forEach(function(fi){
      var vs=FC[fi].verts, ref=[], st=faceStart[fi];
      for(var v=0; v<vs.length; v++){ ref.push((st+v)+'//'+(st+v)); }
      L.push('f '+ref.join(' '));
    });
  });
  dlFile(name+'.obj', L.join('\n'), 'text/plain');
}

/* exportDAE() : Collada avec positions + normales + PLUSIEURS matériaux.
   Chaque finition (corps/étagères/portes/forme) devient un matériau distinct,
   avec son propre polylist. SketchUp/Lumion importent les couleurs séparées. */
function exportDAE(){
  build();
  var groups=matGroups();
  var nm=curName();

  /* positions + normales : tous les sommets, dans l'ordre des faces */
  var pos=[], nor=[], idx=0, faceStart=[];
  for(var f=0; f<FC.length; f++){
    var fa=FC[f], vs=fa.verts;
    faceStart[f]=idx;
    for(var v=0; v<vs.length; v++){
      pos.push(vs[v][0].toFixed(4), vs[v][1].toFixed(4), vs[v][2].toFixed(4));
      var n = fa.vn ? fa.vn[v] : fa.n;
      nor.push(n[0].toFixed(4), n[1].toFixed(4), n[2].toFixed(4));
      idx++;
    }
  }

  /* bibliothèque de matériaux + effets (un par groupe de couleur) */
  var libMat='<library_materials>', libEff='<library_effects>';
  groups.forEach(function(g){
    var r=(g.rgb[0]/255).toFixed(3), gg=(g.rgb[1]/255).toFixed(3), b=(g.rgb[2]/255).toFixed(3);
    libMat += '<material id="'+g.name+'-mat" name="'+g.name+'"><instance_effect url="#'+g.name+'-eff"/></material>';
    libEff += '<effect id="'+g.name+'-eff"><profile_COMMON><technique sid="t"><lambert>'+
      '<diffuse><color>'+r+' '+gg+' '+b+' '+(g.al<1?g.al.toFixed(2):'1')+'</color></diffuse>'+
      (g.al<1?'<transparency><float>'+(1-g.al).toFixed(2)+'</float></transparency>':'')+
      '</lambert></technique></profile_COMMON></effect>';
  });
  libMat+='</library_materials>'; libEff+='</library_effects>';

  /* un polylist par groupe (ses faces, avec ses sommets/normales) */
  var polys='';
  groups.forEach(function(g){
    var vcount=[], p=[];
    g.faces.forEach(function(fi){
      var vs=FC[fi].verts, st=faceStart[fi];
      for(var v=0; v<vs.length; v++){ p.push(st+v, st+v); }
      vcount.push(vs.length);
    });
    polys += '<polylist material="'+g.name+'-sym" count="'+vcount.length+'">'+
      '<input semantic="VERTEX" source="#vtx" offset="0"/>'+
      '<input semantic="NORMAL" source="#src-n" offset="1"/>'+
      '<vcount>'+vcount.join(' ')+'</vcount><p>'+p.join(' ')+'</p></polylist>\n';
  });

  /* binding : associe chaque symbole de matériau à son matériau */
  var bind='';
  groups.forEach(function(g){
    bind += '<instance_material symbol="'+g.name+'-sym" target="#'+g.name+'-mat"/>';
  });

  var dae='<?xml version="1.0" encoding="utf-8"?>\n'+
    '<COLLADA xmlns="http://www.collada.org/2005/11/COLLADASchema" version="1.4.1">\n'+
    '<asset><contributor><author>(c) 2026 Antoine Lacronique, architecte</author></contributor>'+
    '<up_axis>Y_UP</up_axis><unit name="meter" meter="1"/></asset>\n'+
    libMat+'\n'+libEff+'\n'+
    '<library_geometries><geometry id="geo" name="'+xmlEsc(nm)+'"><mesh>\n'+
    '<source id="src-p"><float_array id="arr-p" count="'+pos.length+'">'+pos.join(' ')+'</float_array>\n'+
    '<technique_common><accessor source="#arr-p" count="'+(pos.length/3)+'" stride="3">'+
    '<param name="X" type="float"/><param name="Y" type="float"/><param name="Z" type="float"/></accessor></technique_common></source>\n'+
    '<source id="src-n"><float_array id="arr-n" count="'+nor.length+'">'+nor.join(' ')+'</float_array>\n'+
    '<technique_common><accessor source="#arr-n" count="'+(nor.length/3)+'" stride="3">'+
    '<param name="X" type="float"/><param name="Y" type="float"/><param name="Z" type="float"/></accessor></technique_common></source>\n'+
    '<vertices id="vtx"><input semantic="POSITION" source="#src-p"/></vertices>\n'+
    polys+
    '</mesh></geometry></library_geometries>\n'+
    '<library_visual_scenes><visual_scene id="scn"><node name="'+xmlEsc(nm)+'"><instance_geometry url="#geo">'+
    '<bind_material><technique_common>'+bind+'</technique_common></bind_material>'+
    '</instance_geometry></node></visual_scene></library_visual_scenes>\n'+
    '<scene><instance_visual_scene url="#scn"/></scene>\n</COLLADA>';
  dlFile(nm+'.dae', dae, 'model/vnd.collada+xml');
}

document.getElementById('exp-obj').onclick = exportOBJ;
document.getElementById('exp-dae').onclick = exportDAE;
document.getElementById('exp-ifc').onclick = exportIFC;

/* ============================================================================
   EXPORT IFC (IFC4, format STEP/SPF) — pour ArchiCAD et logiciels BIM
   ----------------------------------------------------------------------------
   Génère un objet de mobilier (IfcFurnishingElement) avec :
   - la hiérarchie spatiale minimale requise : Project > Site > Building > Storey
   - la géométrie en IfcFacetedBrep (faces explicites : nos sommets + faces),
     regroupée par matériau (corps/étagères/portes) pour conserver les finitions
   - les couleurs via IfcStyledItem + IfcSurfaceStyle
   - unités en mètres, axe Z vertical (convention IFC : Z = haut)
   Repère : notre moteur a Y=haut, Z=profondeur. IFC veut Z=haut. On convertit
   chaque sommet (x,y,z) -> (x, z, y) : X reste, Y_ifc=profondeur, Z_ifc=hauteur.
   ============================================================================ */
function exportIFC(){
  build();
  var groups=matGroups();
  var nm=curName();

  /* --- générateur de lignes IFC avec IDs incrémentaux #n --- */
  var lines=[], id=0;
  function E(s){ id++; lines.push('#'+id+'='+s+';'); return '#'+id; }  /* entité -> ref */

  /* GUID IFC (22 caractères base64 IFC). Simple pseudo-aléatoire suffisant ici. */
  function guid(){
    var ch='0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz_$';
    var out='', rnd=null;
    if(window.crypto&&window.crypto.getRandomValues){ rnd=new Uint8Array(22); window.crypto.getRandomValues(rnd); }
    for(var i=0;i<22;i++){ var v=rnd?(rnd[i]&63):Math.floor(Math.random()*64); out+=ch[v]; }
    return out;
  }
  /* conversion sommet moteur (x=largeur,y=hauteur,z=profondeur) -> IFC (Z=haut) */
  function cv(p){ return [p[0], p[2], p[1]]; }
  function num(v){ return (Math.abs(v)<1e-9?0:v).toFixed(5); }

  /* --- contexte géométrique + repères --- */
  var orgRef=E("IFCCARTESIANPOINT((0.,0.,0.))");
  var dirZ  =E("IFCDIRECTION((0.,0.,1.))");
  var dirX  =E("IFCDIRECTION((1.,0.,0.))");
  var axis  =E("IFCAXIS2PLACEMENT3D("+orgRef+","+dirZ+","+dirX+")");
  var wcs   =E("IFCAXIS2PLACEMENT3D("+orgRef+",$,$)");
  var ctx   =E("IFCGEOMETRICREPRESENTATIONCONTEXT($,'Model',3,1.E-5,"+axis+",$)");

  /* --- unités (mètre, m², m³, radian) --- */
  var uL=E("IFCSIUNIT(*,.LENGTHUNIT.,$,.METRE.)");
  var uA=E("IFCSIUNIT(*,.AREAUNIT.,$,.SQUARE_METRE.)");
  var uV=E("IFCSIUNIT(*,.VOLUMEUNIT.,$,.CUBIC_METRE.)");
  var uAng=E("IFCSIUNIT(*,.PLANEANGLEUNIT.,$,.RADIAN.)");
  var units=E("IFCUNITASSIGNMENT(("+uL+","+uA+","+uV+","+uAng+"))");

  /* --- propriétaire / application --- */
  var person=E("IFCPERSON($,'Lacronique','Antoine',$,$,$,$,$)");
  var org=E("IFCORGANIZATION($,'Antoine Lacronique architecte',$,$,$)");
  var pers_org=E("IFCPERSONANDORGANIZATION("+person+","+org+",$)");
  var app=E("IFCAPPLICATION("+org+",'1.0','Catalogue 3D','cat3d')");
  var now=Math.floor(Date.now()/1000);
  var owner=E("IFCOWNERHISTORY("+pers_org+","+app+",$,.ADDED.,$,$,$,"+now+")");

  /* --- hiérarchie spatiale : Project > Site > Building > Storey --- */
  var proj=E("IFCPROJECT('"+guid()+"',"+owner+",'"+stepEsc(nm)+"',$,$,$,$,("+ctx+"),"+units+")");
  var sitePl=E("IFCLOCALPLACEMENT($,"+wcs+")");
  var site=E("IFCSITE('"+guid()+"',"+owner+",'Site',$,$,"+sitePl+",$,$,.ELEMENT.,$,$,$,$,$)");
  var bldPl=E("IFCLOCALPLACEMENT("+sitePl+","+wcs+")");
  var bld=E("IFCBUILDING('"+guid()+"',"+owner+",'Building',$,$,"+bldPl+",$,$,.ELEMENT.,$,$,$)");
  var stPl=E("IFCLOCALPLACEMENT("+bldPl+","+wcs+")");
  var storey=E("IFCBUILDINGSTOREY('"+guid()+"',"+owner+",'Niveau 0',$,$,"+stPl+",$,$,.ELEMENT.,0.)");

  /* relations d'agrégation de la hiérarchie */
  E("IFCRELAGGREGATES('"+guid()+"',"+owner+",$,$,"+proj+",("+site+"))");
  E("IFCRELAGGREGATES('"+guid()+"',"+owner+",$,$,"+site+",("+bld+"))");
  E("IFCRELAGGREGATES('"+guid()+"',"+owner+",$,$,"+bld+",("+storey+"))");

  /* --- géométrie : un IfcFacetedBrep par matériau, + style couleur --- */
  var brepRefs=[];      /* représentations shape items */
  var styledLink=[];    /* (styleditem) à lier */
  groups.forEach(function(g){
    /* points cartésiens uniques de ce groupe */
    var ptMap={}, ptRefs=[];
    function ptRef(p){
      var q=cv(p), k=num(q[0])+'|'+num(q[1])+'|'+num(q[2]);
      if(ptMap[k]) return ptMap[k];
      var r=E("IFCCARTESIANPOINT(("+num(q[0])+","+num(q[1])+","+num(q[2])+"))");
      ptMap[k]=r; return r;
    }
    /* faces -> IfcFace(IfcFaceOuterBound(IfcPolyLoop)) */
    var faceRefs=[];
    g.faces.forEach(function(fi){
      var f=FC[fi], loop=[];
      for(var v=0; v<f.verts.length; v++) loop.push(ptRef(f.verts[v]));
      var pl=E("IFCPOLYLOOP(("+loop.join(',')+"))");
      var bnd=E("IFCFACEOUTERBOUND("+pl+",.T.)");
      faceRefs.push(E("IFCFACE(("+bnd+"))"));
    });
    var shell=E("IFCCLOSEDSHELL(("+faceRefs.join(',')+"))");
    var brep=E("IFCFACETEDBREP("+shell+")");
    brepRefs.push(brep);

    /* style couleur du matériau */
    var r=(g.rgb[0]/255), gg=(g.rgb[1]/255), b=(g.rgb[2]/255);
    var col=E("IFCCOLOURRGB($,"+num(r)+","+num(gg)+","+num(b)+")");
    var transp = (g.al<1) ? (1-g.al).toFixed(2) : '0.';
    var rend=E("IFCSURFACESTYLERENDERING("+col+","+transp+",$,$,$,$,$,$,.FLAT.)");
    var sstyle=E("IFCSURFACESTYLE('"+g.name+"',.BOTH.,("+rend+"))");
    var styassign=E("IFCSTYLEDITEM("+brep+",("+sstyle+"),$)");
    styledLink.push(styassign);
  });

  /* représentation de forme (regroupe tous les breps) */
  var shapeRep=E("IFCSHAPEREPRESENTATION("+ctx+",'Body','Brep',("+brepRefs.join(',')+"))");
  var prodShape=E("IFCPRODUCTDEFINITIONSHAPE($,$,("+shapeRep+"))");

  /* placement de l'objet meuble */
  var objPl=E("IFCLOCALPLACEMENT("+stPl+","+wcs+")");

  /* l'objet de mobilier */
  var furn=E("IFCFURNISHINGELEMENT('"+guid()+"',"+owner+",'"+stepEsc(nm)+"','Meuble parametrique - (c) 2026 Antoine Lacronique, architecte',$,"+objPl+","+prodShape+",$)");

  /* rattache le meuble à l'étage */
  E("IFCRELCONTAINEDINSPATIALSTRUCTURE('"+guid()+"',"+owner+",$,$,("+furn+"),"+storey+")");

  /* --- assemblage du fichier STEP --- */
  var ts=new Date().toISOString();
  var header=
    "ISO-10303-21;\n"+
    "HEADER;\n"+
    "FILE_DESCRIPTION(('ViewDefinition [CoordinationView]'),'2;1');\n"+
    "FILE_NAME('"+stepEsc(nm)+".ifc','"+ts+"',('(c) 2026 Antoine Lacronique, architecte'),"+
    "('Antoine Lacronique architecte'),'Catalogue 3D','Catalogue 3D','');\n"+
    "FILE_SCHEMA(('IFC4'));\n"+
    "ENDSEC;\n"+
    "DATA;\n";
  var footer="ENDSEC;\nEND-ISO-10303-21;\n";
  var ifc=header + lines.join('\n') + '\n' + footer;
  dlFile(nm+'.ifc', ifc, 'application/x-step');
}


/* ============================================================================
   9. INIT — démarrage
   ============================================================================ */
if('ontouchstart' in window){
  document.getElementById('hint').textContent='1 DOIGT orbiter | 2 DOIGTS zoomer';
}
setupTabs();          /* onglets principaux Génériques/Fabricants */
buildCatList();       /* liste des catégories */
buildShapeGrid();
buildRenderRow();
selectCat('objet');   /* démarre sur Objet (= meuble) */
refreshView();        /* affiche l'objet courant */
requestAnimationFrame(frame);

/* redimensionnement du viewer WebGL quand la fenêtre change */
window.addEventListener('resize', function(){
  DIRTY=true;
  if(WGL.ready){ WGL.resize(); WGL.render(); }
});
['input','change','click'].forEach(function(ev){
  document.addEventListener(ev, requestRender, true);
});
</script>
</body>
</html>
