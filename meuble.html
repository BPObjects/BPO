<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BPO — Catalogue 3D paramétrique</title>
<style>
/* ============================================================
   STYLES — interface minimale : viewport plein écran + panneau
   ============================================================ */
:root{
  --bg:#1a1d23;    /* fond général        */
  --pn:#20242c;    /* panneaux            */
  --p2:#262b34;    /* elements internes          */
  --ln:#343a45;    /* lignes / bordures   */
  --tx:#e8e9ec;    /* texte principal     */
  --dm:#8b92a0;    /* texte secondaire    */
  --am:#ff8a3d;    /* accent orange       */
  --cy:#5eb8ff;    /* accent bleu         */
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--tx);
  font-family:system-ui,sans-serif;overflow:hidden;-webkit-tap-highlight-color:transparent;}

/* Disposition PORTRAIT (mobile vertical) : header / viewport bien visible /
   arbo compacte / paramètres. Le viewport a une hauteur garantie pour ne pas
   être écrasé. En PAYSAGE, on bascule en 3 colonnes (media query plus bas). */
#app{display:grid;height:100vh;height:100dvh;
  grid-template-rows:46px 45vh auto 1fr;}
/* ordre portrait : header(1) / viewport(2) / arbo(3) / paramètres(4) */
header{grid-row:1;}
#vp{grid-row:2;}
#sidebar{grid-row:3;}
#panel{grid-row:4;}
header{display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;background:var(--pn);border-bottom:1px solid var(--ln);}
.brand{font-weight:700;font-size:13px;display:flex;align-items:center;gap:8px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--am);display:inline-block;}
.copyr{font-weight:400;font-size:10px;color:var(--am);}

/* Viewport 3D */
#vp{position:relative;overflow:hidden;}
#cv{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;}
.hint{position:absolute;top:9px;left:9px;font-family:monospace;font-size:9px;color:var(--dm);pointer-events:none;}
.sig{position:absolute;bottom:9px;left:9px;font-family:monospace;font-size:9px;color:var(--am);opacity:.55;pointer-events:none;}
.dims{position:absolute;bottom:9px;right:9px;font-family:monospace;font-size:10px;color:var(--am);pointer-events:none;}

/* Colonne gauche : navigation catalogue.
   Mobile : barre horizontale compacte (scroll latéral). Desktop : colonne. */
#sidebar{background:var(--pn);border-bottom:1px solid var(--ln);padding:8px 10px;
  overflow-x:auto;overflow-y:hidden;}
#sidebar .slbl{display:none;}                 /* libellé masqué sur mobile (gain de place) */
#sidebar .tabs{margin-bottom:7px;}

/* Panneau de contrôle (paramètres). Mobile : occupe la dernière rangée (40vh). */
#panel{background:var(--pn);border-top:1px solid var(--ln);padding:12px 14px;
  overflow-y:auto;}
.slbl{font-family:monospace;font-size:9px;text-transform:uppercase;letter-spacing:1.2px;
  color:var(--dm);margin:0 0 8px 1px;}
.fld{margin-bottom:11px;}
.fh{display:flex;justify-content:space-between;margin-bottom:3px;}
.fh label{font-size:11px;color:var(--tx);font-weight:500;}
.fh .u{font-size:9.5px;color:var(--dm);}
input[type=range]{width:100%;height:4px;-webkit-appearance:none;background:var(--ln);border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--cy);cursor:pointer;}
input[type=number]{width:62px;font-family:monospace;font-size:10.5px;color:var(--cy);
  background:var(--p2);border:1px solid var(--ln);border-radius:3px;padding:2px 5px;text-align:right;outline:none;-moz-appearance:textfield;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:var(--ln);border-radius:2px;}

/* Onglets Meuble / Formes */
.tabs{display:flex;gap:4px;margin-bottom:11px;}
.tab{flex:1;padding:7px 4px;font-size:11px;font-weight:600;background:var(--p2);
  border:1px solid var(--ln);color:var(--dm);border-radius:4px;cursor:pointer;}
.tab.on{border-color:var(--am);color:var(--am);background:rgba(255,138,61,.1);}

/* Liste des catégories.
   Mobile (défaut) : rangée horizontale scrollable. Desktop : colonne (voir media query). */
.cat-list{display:flex;flex-direction:row;gap:5px;margin-bottom:0;}
.cat-list button{padding:7px 12px;font-size:11px;background:var(--p2);text-align:left;
  border:1px solid var(--ln);color:var(--dm);border-radius:4px;cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;gap:4px;white-space:nowrap;flex:0 0 auto;}
.cat-list button.on{border-color:var(--am);color:var(--am);background:rgba(255,138,61,.12);}
.cat-list button .badge{font-size:9px;opacity:.5;}
/* sous-menu de produits (sous une catégorie active, ex. Architecture-AL Design) */
.subcat-list{display:flex;flex-direction:column;gap:2px;margin:2px 0 4px 10px;
  border-left:1px solid var(--ln);padding-left:6px;}
.subcat-item{padding:5px 10px;font-size:10.5px;background:transparent;text-align:left;
  border:1px solid transparent;border-radius:4px;color:var(--dm);cursor:pointer;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.subcat-item:hover{color:var(--tx);background:var(--p2);}
.subcat-item.on{color:var(--cy);border-color:rgba(94,184,255,.4);background:rgba(94,184,255,.1);}

/* Message placeholder « à venir » */
#todo-msg{padding:18px 12px;text-align:center;color:var(--dm);font-size:12px;
  border:1px dashed var(--ln);border-radius:6px;margin-bottom:11px;line-height:1.5;}
#todo-msg .big{font-size:22px;display:block;margin-bottom:6px;opacity:.5;}

/* Interface du mur multicouche */
.wall-toggle{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;font-size:11px;color:var(--tx);}
.wall-toggle button{padding:4px 10px;font-size:10px;border-radius:4px;cursor:pointer;
  background:var(--p2);border:1px solid var(--ln);color:var(--dm);}
.wall-toggle button.on{border-color:var(--am);color:var(--am);background:rgba(255,138,61,.12);}
.mat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-bottom:11px;}
.mat-grid button{padding:7px 4px;font-size:10px;background:var(--p2);
  border:1px solid var(--ln);color:var(--dm);border-radius:4px;cursor:pointer;}
.mat-grid button.on{border-color:var(--cy);color:var(--cy);background:rgba(94,184,255,.12);}
.wall-total{margin-top:10px;padding:8px 10px;background:var(--p2);border-radius:5px;
  font-size:11px;color:var(--dm);text-align:center;}
.wall-total b{color:var(--am);font-size:13px;}
.steel-select{width:100%;padding:7px 8px;font-size:11px;background:var(--p2);
  border:1px solid var(--ln);color:var(--tx);border-radius:4px;cursor:pointer;margin-bottom:11px;}
.product-card{padding:4px 2px;}
.pc-maker{font-size:10px;font-weight:700;letter-spacing:0.14em;color:var(--cy);margin-bottom:6px;}
.pc-name{font-size:20px;font-weight:300;color:var(--tx);margin-bottom:10px;}
.pc-desc{font-size:12.5px;color:var(--dm);line-height:1.5;margin-bottom:16px;}
.pc-spec{display:flex;justify-content:space-between;align-items:center;padding:8px 0;
  border-top:1px solid var(--ln);font-size:12px;}
.pc-spec span{color:var(--dm);}
.pc-spec b{color:var(--tx);font-weight:500;}
.pc-badge{margin-top:14px;padding:8px 10px;background:rgba(94,184,255,.1);border-radius:5px;
  font-size:10.5px;color:var(--cy);text-align:center;}

/* Grille de sélection des formes */
.shape-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:11px;}
.shape-grid button{padding:8px 4px;font-size:10px;background:var(--p2);
  border:1px solid var(--ln);color:var(--dm);border-radius:4px;cursor:pointer;}
.shape-grid button.on{border-color:var(--cy);color:var(--cy);background:rgba(94,184,255,.1);}

/* Boutons de mode de rendu */
.render-row{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-bottom:11px;}
.render-row button{padding:7px 4px;font-size:10px;background:var(--p2);
  border:1px solid var(--ln);color:var(--dm);border-radius:4px;cursor:pointer;}
.render-row button.on{border-color:var(--cy);color:var(--cy);background:rgba(94,184,255,.1);}

/* Finitions */
.finish-elems{display:flex;gap:4px;margin-bottom:8px;}
.finish-elems button{flex:1;padding:6px 4px;font-size:10px;background:var(--p2);
  border:1px solid var(--ln);color:var(--dm);border-radius:4px;cursor:pointer;}
.finish-elems button.on{border-color:var(--am);color:var(--am);background:rgba(255,138,61,.1);}
.finish-tabs{display:flex;gap:4px;margin-bottom:8px;}
.finish-tabs button{flex:1;padding:5px 0;font-size:9.5px;background:var(--p2);
  border:1px solid var(--ln);color:var(--dm);border-radius:3px;cursor:pointer;}
.finish-tabs button.on{border-color:var(--cy);color:var(--cy);background:rgba(94,184,255,.1);}
.ral-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:3px;margin-bottom:6px;}
.ral-grid div{aspect-ratio:1;border-radius:2px;border:2px solid var(--ln);cursor:pointer;}
.ral-grid div.on{border-color:var(--am);}
.ral-fam{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px;}
.ral-fam button{flex:1 0 auto;padding:4px 7px;font-size:9.5px;background:var(--p2);
  border:1px solid var(--ln);color:var(--dm);border-radius:4px;cursor:pointer;white-space:nowrap;}
.ral-fam button.on{border-color:var(--am);color:var(--am);background:rgba(255,138,61,.12);}
.ral-search{width:100%;padding:6px 8px;font-size:11px;background:var(--p2);
  border:1px solid var(--ln);color:var(--tx);border-radius:4px;margin-bottom:6px;box-sizing:border-box;}
.ral-info{font-size:9px;color:var(--dm);text-align:center;margin-bottom:4px;font-family:monospace;}
.free-pick{width:100%;height:32px;border:1px solid var(--ln);border-radius:4px;background:var(--p2);cursor:pointer;}
.tex-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:6px;}
.tex-none{width:100%;padding:7px;font-size:10.5px;background:var(--p2);border:1px solid var(--ln);
  color:var(--dm);border-radius:4px;cursor:pointer;margin-bottom:8px;}
.tex-import{width:100%;font-size:10px;color:var(--dm);margin-bottom:4px;}
.tex-cell canvas.sw{width:100%;height:auto;aspect-ratio:1;border-radius:3px;display:block;image-rendering:auto;}
.tex-cell{cursor:pointer;}
.tex-cell .sw{aspect-ratio:1.4;border-radius:3px;border:2px solid var(--ln);}
.tex-cell.on .sw{border-color:var(--cy);}
.tex-cell .nm{font-size:8.5px;color:var(--dm);text-align:center;margin-top:2px;}
input[type=color]{width:100%;height:28px;border:1px solid var(--ln);border-radius:3px;
  background:var(--p2);cursor:pointer;padding:2px;margin-bottom:6px;}

/* Boutons d'export */
.exp-row{display:flex;gap:5px;}
.exp-row button{flex:1;padding:8px 4px;font-size:10px;font-family:monospace;
  background:var(--p2);border:1px solid var(--ln);color:var(--cy);border-radius:4px;cursor:pointer;}
.exp-note{font-size:8.5px;color:var(--dm);margin-top:5px;line-height:1.4;}

/* Layout 3 colonnes — arbo gauche | viewport centre | params droite.
   S'applique sur grand écran OU dès que l'appareil est en PAYSAGE (mobile inclus,
   car c'est là qu'on a la largeur pour étaler les 3 colonnes confortablement). */
@media(min-width:760px), (orientation:landscape){
  #app{grid-template-columns:190px 1fr 280px;grid-template-rows:46px 1fr;}
  header{grid-column:1/4;grid-row:1;}
  #sidebar{grid-column:1;grid-row:2;border-bottom:none;border-right:1px solid var(--ln);
    overflow-y:auto;overflow-x:hidden;padding:12px 12px;}
  #sidebar .slbl{display:block;}              /* libellé "Catégorie" visible */
  #vp{grid-column:2;grid-row:2;}
  #panel{grid-column:3;grid-row:2;border-top:none;border-left:1px solid var(--ln);max-height:none;}
  /* arborescence en colonne verticale */
  .cat-list{flex-direction:column;gap:3px;margin-bottom:11px;}
  .cat-list button{padding:7px 10px;}
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand"><span class="dot"></span>Catalogue 3D
      <span class="copyr">© 2026 Antoine Lacronique, architecte</span>
    </div>
  </header>

  <!-- COLONNE GAUCHE : navigation catalogue (onglets + arborescence) -->
  <div id="sidebar">
    <!-- Onglets principaux : Génériques / Fabricants -->
    <div class="tabs">
      <button class="tab on" data-branch="generiques">Génériques</button>
      <button class="tab" data-branch="fabricants">Fabricants</button>
    </div>
    <!-- Arborescence des catégories de la branche active -->
    <div class="slbl">Catégorie</div>
    <div id="cat-list" class="cat-list"></div>
  </div>

  <!-- COLONNE CENTRE : viewport 3D -->
  <div id="vp">
    <canvas id="cv"></canvas>
    <canvas id="glcv" style="display:none;position:absolute;inset:0;width:100%;height:100%;touch-action:none;"></canvas>
    <div class="hint" id="hint">GLISSER · orbiter | MOLETTE · zoomer</div>
    <div class="sig">© 2026 Antoine Lacronique, architecte</div>
    <div class="dims" id="dims">—</div>
  </div>

  <!-- COLONNE DROITE : paramètres de l'objet -->
  <div id="panel">
    <!-- Sélecteur de forme (visible seulement dans la catégorie Forme) -->
    <div id="shape-sel" style="display:none;">
      <div class="slbl">Forme</div>
      <div class="shape-grid" id="shape-grid"></div>
    </div>

    <!-- Message placeholder pour les catégories pas encore remplies -->
    <div id="todo-msg" style="display:none;"></div>

    <!-- Bloc paramètres + rendu + finitions + export (masqué si catégorie vide) -->
    <div id="obj-controls">
      <div class="slbl">Dimensions &amp; structure</div>
      <div id="params"></div>

      <!-- Mode de rendu -->
      <div class="slbl" style="margin-top:6px;">Rendu</div>
      <div class="render-row" id="render-row"></div>
      <div id="shine-row" style="display:none;margin-bottom:11px;">
        <div class="fh"><label>Brillance</label><span class="u" id="shine-val">35%</span></div>
        <input type="range" id="shine-slider" min="0" max="100" step="5" value="35">
      </div>

      <!-- Ouverture des portes (meuble uniquement) -->
      <div id="door-row" style="margin-bottom:11px;">
        <div class="fh"><label>Ouverture portes</label><span class="u" id="door-val">0°</span></div>
        <input type="range" id="door-slider" min="0" max="110" step="5" value="0">
      </div>

      <!-- Finitions couleur -->
      <div class="slbl" style="margin-top:6px;">Finition</div>
      <div id="finish-elems" class="finish-elems"></div>
      <div id="finish-panel"></div>

      <!-- Exports -->
      <div class="slbl" style="margin-top:6px;">Export</div>
      <div class="exp-row">
        <button id="exp-obj">↓ .OBJ</button>
        <button id="exp-dae">↓ .DAE</button>
        <button id="exp-ifc">↓ .IFC</button>
      </div>
      <div class="exp-note">OBJ universel · DAE pour SketchUp · IFC pour ArchiCAD/BIM (unités m)</div>
    </div>
  </div>
</div>
<script src="data/fabricant-meshes.js"></script>
<script src="data/fabricants.js"></script>
<script src="data/bureau-tex.js"></script>
<script>
/* ====== DONNÉES WEBGL DES OBJETS FABRICANTS (packagées, gzip+base64) ====== */
/* WEBGL_OBJECTS -> data/ */

/* ============================================================================
   MOTEUR WEBGL — viewer PBR pour les objets fabricants (géométrie complète).
   Remplace le Canvas 2D quand on affiche un produit fabricant. Décompresse les
   données packagées (gzip+base64), rendu Cook-Torrance, orbite + ambiances.
   ============================================================================ */
/* BUREAU_TEX -> data/ */

var WGL = {
  gl:null, prog:null, buffers:{}, model:null, env:'warm',
  cam:{th:0.7, ph:1.05, r:4, ty:0.5},
  ready:false, raf:null, cache:{},
  txActive:false, txt:{}, tbuf:{}, progT:null, texModel:null,
  gActive:false, progG:null, gbuf:null
};

WGL.ENVS = {
  studio:{L:[[0.4,0.8,0.5],[-0.5,0.3,-0.4],[0.1,-0.6,0.3]],C:[[1.0,1.0,1.0],[0.4,0.45,0.55],[0.25,0.22,0.2]],aT:[0.55,0.6,0.7],aB:[0.18,0.17,0.16]},
  warm:{L:[[0.5,0.7,0.4],[-0.4,0.4,-0.5],[0.0,-0.5,0.4]],C:[[1.0,0.92,0.78],[0.5,0.42,0.35],[0.3,0.25,0.2]],aT:[0.6,0.55,0.48],aB:[0.2,0.16,0.13]},
  cool:{L:[[0.3,0.85,0.45],[-0.6,0.3,-0.3],[0.2,-0.5,0.3]],C:[[0.85,0.9,1.0],[0.4,0.48,0.6],[0.2,0.24,0.3]],aT:[0.5,0.58,0.72],aB:[0.15,0.17,0.2]}
};

WGL.b64ToBytes = function(b){var s=atob(b),n=s.length,a=new Uint8Array(n);for(var i=0;i<n;i++)a[i]=s.charCodeAt(i);return a;};
WGL.gunzip = async function(bytes){var ds=new DecompressionStream('gzip');var st=new Blob([bytes]).stream().pipeThrough(ds);return new Uint8Array(await new Response(st).arrayBuffer());};

WGL.initGL = function(){
  if(WGL.gl) return true;
  var cv=document.getElementById('glcv');
  var gl=cv.getContext('webgl',{antialias:true});
  if(!gl){ console.error('WebGL indisponible'); return false; }
  gl.getExtension('OES_element_index_uint');
  WGL.gl=gl;
  var vs='attribute vec3 p;attribute vec3 n;attribute vec3 c;attribute vec2 mr;'+
    'uniform mat4 mvp;varying vec3 vn;varying vec3 vc;varying vec2 vmr;varying vec3 vw;'+
    'void main(){gl_Position=mvp*vec4(p,1.0);vn=n;vc=c;vmr=mr;vw=p;}';
  var fs='precision highp float;varying vec3 vn;varying vec3 vc;varying vec2 vmr;varying vec3 vw;'+
    'uniform vec3 camPos;uniform vec3 lightDirs[3];uniform vec3 lightCols[3];uniform vec3 ambTop;uniform vec3 ambBot;uniform float ovOn;uniform vec3 ovCol;'+
    'const float PI=3.14159265;'+
    'float D_GGX(float NoH,float a){float a2=a*a;float d=NoH*NoH*(a2-1.0)+1.0;return a2/(PI*d*d);}'+
    'float G_Smith(float NoV,float NoL,float a){float k=a*0.5;float gv=NoV/(NoV*(1.0-k)+k);float gl=NoL/(NoL*(1.0-k)+k);return gv*gl;}'+
    'vec3 fres(float c,vec3 F0){return F0+(1.0-F0)*pow(1.0-c,5.0);}'+
    'void main(){vec3 N=normalize(vn);vec3 Vd=normalize(camPos-vw);if(dot(N,Vd)<0.0)N=-N;'+
    'float metal=mix(vmr.x,0.0,ovOn);float rough=clamp(mix(vmr.y,0.6,ovOn),0.05,1.0);vec3 alb=mix(vc,ovCol,ovOn);'+
    'vec3 F0=mix(vec3(0.04),alb,metal);vec3 dc=alb*(1.0-metal);float a=rough*rough;'+
    'float NoV=max(dot(N,Vd),0.001);vec3 col=vec3(0.0);'+
    'for(int i=0;i<3;i++){vec3 Ld=normalize(lightDirs[i]);vec3 H=normalize(Vd+Ld);'+
    'float NoL=max(dot(N,Ld),0.0);float NoH=max(dot(N,H),0.0);float VoH=max(dot(Vd,H),0.0);'+
    'float D=D_GGX(NoH,a);float G=G_Smith(NoV,NoL,a);vec3 F=fres(VoH,F0);'+
    'vec3 spec=(D*G*F)/(4.0*NoV*NoL+0.001);vec3 kd=(1.0-F)*(1.0-metal);'+
    'col+=(kd*dc/PI+spec)*lightCols[i]*NoL;}'+
    'float hemi=N.y*0.5+0.5;vec3 amb=mix(ambBot,ambTop,hemi);col+=amb*alb*(0.6+0.4*(1.0-metal));'+
    'vec3 R=reflect(-Vd,N);float rh=R.y*0.5+0.5;vec3 er=mix(ambBot,ambTop,rh)*1.4;'+
    'vec3 Fe=fres(NoV,F0)*(1.0-rough);col+=er*Fe;'+
    'col=col/(col+vec3(1.0));col=pow(col,vec3(1.0/2.2));gl_FragColor=vec4(col,1.0);}';
  function sh(t,s){var o=gl.createShader(t);gl.shaderSource(o,s);gl.compileShader(o);if(!gl.getShaderParameter(o,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(o));return o;}
  var pr=gl.createProgram();gl.attachShader(pr,sh(gl.VERTEX_SHADER,vs));gl.attachShader(pr,sh(gl.FRAGMENT_SHADER,fs));gl.linkProgram(pr);gl.useProgram(pr);
  WGL.prog=pr;
  gl.enable(gl.DEPTH_TEST);
  WGL.bindEvents(cv);
  return true;
};

WGL.bindEvents=function(cv){
  var drag=false,lx,ly;
  cv.addEventListener('pointerdown',function(e){drag=true;lx=e.clientX;ly=e.clientY;cv.setPointerCapture&&cv.setPointerCapture(e.pointerId);});
  cv.addEventListener('pointerup',function(){drag=false;});
  cv.addEventListener('pointermove',function(e){if(!drag)return;WGL.cam.th-=(e.clientX-lx)*0.01;WGL.cam.ph-=(e.clientY-ly)*0.01;WGL.cam.ph=Math.max(0.15,Math.min(2.9,WGL.cam.ph));lx=e.clientX;ly=e.clientY;WGL.render();});
  cv.addEventListener('wheel',function(e){e.preventDefault();WGL.cam.r*=(1+e.deltaY*0.001);WGL.render();},{passive:false});
  // pincement mobile
  var pd=0;

WGL.uploadFC=function(faces){
  var gl=WGL.gl;
  if(WGL._gbufs){ WGL._gbufs.forEach(function(b){gl.deleteBuffer(b);}); }
  WGL._gbufs=[];
  var PO=[],NO=[],CO=[], PT=[],NT=[],CT=[];
  for(var i=0;i<faces.length;i++){
    var f=faces[i], v=f.verts, al=(f.al==null?1:f.al), c=f.col||[200,200,200], isT=(al<1);
    var P=isT?PT:PO, N=isT?NT:NO, C=isT?CT:CO;
    for(var k=1;k<v.length-1;k++){
      var oi=[0,k,k+1];
      for(var j=0;j<3;j++){
        var p=v[oi[j]]; P.push(p[0],p[1],p[2]);
        var nn=f.vn?f.vn[oi[j]]:f.n; N.push(nn[0],nn[1],nn[2]);
        C.push(c[0]/255,c[1]/255,c[2]/255,al);
      }
    }
  }
  function mk(arr){var b=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,b);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(arr),gl.STATIC_DRAW);WGL._gbufs.push(b);return b;}
  WGL.gbuf={ pO:mk(PO),nO:mk(NO),cO:mk(CO),countO:PO.length/3,
             pT:mk(PT),nT:mk(NT),cT:mk(CT),countT:PT.length/3 };
};
WGL.renderG=function(){
  var gl=WGL.gl,cv=gl.canvas,cam=WGL.cam,P=WGL.progG,G=WGL.gbuf;
  if(!P||!G) return;
  var ex=cam.r*Math.sin(cam.ph)*Math.sin(cam.th),ey=cam.ty+cam.r*Math.cos(cam.ph),ez=cam.r*Math.sin(cam.ph)*Math.cos(cam.th);
  var mv=WGL._look([ex,ey,ez],[0,cam.ty,0],[0,1,0]);
  var prj=WGL._persp(0.95,cv.width/cv.height,0.02,100), pv=WGL._mul(prj,mv);
  var e=WGL.ENVS[WGL.env];
  gl.clearColor(0.102,0.110,0.130,1); gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
  gl.useProgram(P);
  gl.uniformMatrix4fv(gl.getUniformLocation(P,'pv'),false,pv);
  gl.uniform3f(gl.getUniformLocation(P,'camPos'),ex,ey,ez);
  gl.uniform3fv(gl.getUniformLocation(P,'lightDirs'),new Float32Array([].concat.apply([],e.L)));
  gl.uniform3fv(gl.getUniformLocation(P,'lightCols'),new Float32Array([].concat.apply([],e.C)));
  gl.uniform3fv(gl.getUniformLocation(P,'ambTop'),new Float32Array(e.aT));
  gl.uniform3fv(gl.getUniformLocation(P,'ambBot'),new Float32Array(e.aB));
  var lp=gl.getAttribLocation(P,'p'), ln=gl.getAttribLocation(P,'n'), lc=gl.getAttribLocation(P,'c');
  function draw(pb,nb,cb,count){
    if(!count) return;
    gl.bindBuffer(gl.ARRAY_BUFFER,pb); gl.enableVertexAttribArray(lp); gl.vertexAttribPointer(lp,3,gl.FLOAT,false,0,0);
    gl.bindBuffer(gl.ARRAY_BUFFER,nb); gl.enableVertexAttribArray(ln); gl.vertexAttribPointer(ln,3,gl.FLOAT,false,0,0);
    gl.bindBuffer(gl.ARRAY_BUFFER,cb); gl.enableVertexAttribArray(lc); gl.vertexAttribPointer(lc,4,gl.FLOAT,false,0,0);
    gl.drawArrays(gl.TRIANGLES,0,count);
  }
  gl.enable(gl.DEPTH_TEST); gl.depthMask(true); gl.disable(gl.BLEND);
  draw(G.pO,G.nO,G.cO,G.countO);
  gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA); gl.depthMask(false);
  draw(G.pT,G.nT,G.cT,G.countT);
  gl.depthMask(true); gl.disable(gl.BLEND);
};

/* Convertit un hex '#RRGGBB' en [r,g,b] */
function hexToRgb(h){ return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }

/* ----------------------------------------------------------------------------
   GÉNÉRATION DES TEXTURES PROCÉDURALES
   Chaque générateur dessine un motif réaliste sur un canvas hors-écran et on
   en extrait l'ImageData (pixels). Bruit déterministe pour un rendu stable.
   ---------------------------------------------------------------------------- */
function mulberry32(seed){
  return function(){
    seed|=0; seed=seed+0x6D2B79F5|0;
    var t=Math.imul(seed^seed>>>15, 1|seed);
    t=t+Math.imul(t^t>>>7, 61|t)^t;
    return ((t^t>>>14)>>>0)/4294967296;
  };
}
function mix(a,b,t){ return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t]; }
function clamp255(v){ return v<0?0:(v>255?255:v); }

/* genTextureCanvas() : dessine la texture `def` et renvoie {data,w,h}. */
function genTextureCanvas(def){
  var S=TEX_SIZE;
  var cv=document.createElement('canvas'); cv.width=S; cv.height=S;
  var g=cv.getContext('2d');
  var base=def.base, alt=def.alt, rnd=mulberry32(0x9E37+def.id.length*131);
  g.fillStyle='rgb('+base[0]+','+base[1]+','+base[2]+')'; g.fillRect(0,0,S,S);

  if(def.gen==='wood'){
    for(var x=0;x<S;x++){
      var v=Math.sin(x*0.04 + Math.sin(x*0.013)*3)*0.5+0.5;
      v=v*0.6 + rnd()*0.12;
      var col=mix(base, alt, v*0.8);
      g.fillStyle='rgb('+(col[0]|0)+','+(col[1]|0)+','+(col[2]|0)+')';
      g.fillRect(x,0,1,S);
    }
    for(var i=0;i<S;i++){
      if(rnd()<0.12){
        var c=mix(base,alt,0.5+rnd()*0.4);
        g.fillStyle='rgba('+(c[0]|0)+','+(c[1]|0)+','+(c[2]|0)+',0.25)';
        g.fillRect(0,i,S,1);
      }
    }
  } else if(def.gen==='concrete' || def.gen==='plaster'){
    var img=g.getImageData(0,0,S,S), d=img.data;
    for(var i=0;i<d.length;i+=4){
      var n=(rnd()-0.5)*(def.gen==='concrete'?34:20);
      d[i]=clamp255(d[i]+n); d[i+1]=clamp255(d[i+1]+n); d[i+2]=clamp255(d[i+2]+n);
    }
    g.putImageData(img,0,0);
    for(var k=0;k<40;k++){
      var cx=rnd()*S, cy=rnd()*S, r=10+rnd()*40;
      var c=mix(base,alt,rnd()*0.5);
      var grd=g.createRadialGradient(cx,cy,0,cx,cy,r);
      grd.addColorStop(0,'rgba('+(c[0]|0)+','+(c[1]|0)+','+(c[2]|0)+',0.10)');
      grd.addColorStop(1,'rgba(0,0,0,0)');
      g.fillStyle=grd; g.fillRect(cx-r,cy-r,r*2,r*2);
    }
  } else if(def.gen==='brick'){
    var bw=S/4, bh=S/8, joint=2;
    g.fillStyle='rgb(205,200,190)'; g.fillRect(0,0,S,S);
    for(var row=0; row*bh<S; row++){
      var off=(row%2)*(bw/2);
      for(var bx=-1; bx*bw<S+bw; bx++){
        var x=bx*bw+off+joint, y=row*bh+joint;
        var shade=0.75+rnd()*0.5;
        var c=mix(alt,base,shade*0.7+0.15);
        g.fillStyle='rgb('+(c[0]|0)+','+(c[1]|0)+','+(c[2]|0)+')';
        g.fillRect(x,y,bw-joint*2,bh-joint*2);
      }
    }
  } else if(def.gen==='stone'){
    var img2=g.getImageData(0,0,S,S), d2=img2.data;
    for(var i=0;i<d2.length;i+=4){
      var n=(rnd()-0.5)*40;
      d2[i]=clamp255(d2[i]+n); d2[i+1]=clamp255(d2[i+1]+n); d2[i+2]=clamp255(d2[i+2]+n);
    }
    g.putImageData(img2,0,0);
    for(var k=0;k<28;k++){
      var cx=rnd()*S, cy=rnd()*S, r=14+rnd()*30;
      var c=mix(base,alt,rnd());
      g.strokeStyle='rgba('+(c[0]|0)+','+(c[1]|0)+','+(c[2]|0)+',0.4)';
      g.lineWidth=1+rnd()*1.5;
      g.beginPath(); g.arc(cx,cy,r,0,6.28); g.stroke();
    }
  } else if(def.gen==='marble'){
    for(var k=0;k<14;k++){
      var x0=rnd()*S, y0=rnd()*S;
      g.strokeStyle='rgba('+(alt[0]|0)+','+(alt[1]|0)+','+(alt[2]|0)+','+(0.15+rnd()*0.2)+')';
      g.lineWidth=0.5+rnd()*2;
      g.beginPath(); g.moveTo(x0,y0);
      for(var s=0;s<8;s++){ x0+=(rnd()-0.5)*60; y0+=(rnd()-0.3)*40; g.lineTo(x0,y0); }
      g.stroke();
    }
  } else if(def.gen==='metal'){
    for(var y=0;y<S;y++){
      var v=0.45+0.1*Math.sin(y*0.5)+rnd()*0.12;
      var col=mix(alt,base,v);
      g.fillStyle='rgb('+(col[0]|0)+','+(col[1]|0)+','+(col[2]|0)+')';
      g.fillRect(0,y,S,1);
    }
  } else if(def.gen==='tile'){
    var ts=S/4, jt=3;
    g.fillStyle='rgb(150,154,160)'; g.fillRect(0,0,S,S);
    for(var ty=0;ty<4;ty++) for(var txi=0;txi<4;txi++){
      var c=mix(base,alt,rnd()*0.15);
      g.fillStyle='rgb('+(c[0]|0)+','+(c[1]|0)+','+(c[2]|0)+')';
      g.fillRect(txi*ts+jt,ty*ts+jt,ts-jt*2,ts-jt*2);
    }
  } else if(def.gen==='fabric'){
    /* textile : trame tissée (petits points alternés) + bruit fin */
    var img3=g.getImageData(0,0,S,S), d3=img3.data;
    for(var i=0;i<d3.length;i+=4){
      var n=(rnd()-0.5)*16;
      d3[i]=clamp255(d3[i]+n); d3[i+1]=clamp255(d3[i+1]+n); d3[i+2]=clamp255(d3[i+2]+n);
    }
    g.putImageData(img3,0,0);
    /* trame : fines lignes croisées */
    for(var i=0;i<S;i+=3){
      var c=mix(base,alt,0.4);
      g.fillStyle='rgba('+(c[0]|0)+','+(c[1]|0)+','+(c[2]|0)+',0.18)';
      g.fillRect(0,i,S,1); g.fillRect(i,0,1,S);
    }
  } else if(def.gen==='glass'){
    /* verre : dégradé doux + reflets diagonaux légers */
    var grd2=g.createLinearGradient(0,0,S,S);
    grd2.addColorStop(0,'rgb('+base[0]+','+base[1]+','+base[2]+')');
    grd2.addColorStop(1,'rgb('+alt[0]+','+alt[1]+','+alt[2]+')');
    g.fillStyle=grd2; g.fillRect(0,0,S,S);
    /* bandes de reflet */
    for(var k=0;k<5;k++){
      var xx=rnd()*S;
      g.strokeStyle='rgba(255,255,255,'+(0.04+rnd()*0.06)+')';
      g.lineWidth=8+rnd()*20;
      g.beginPath(); g.moveTo(xx,0); g.lineTo(xx-S*0.4,S); g.stroke();
    }
  } else if(def.gen==='vinyl'){
    /* sol souple/lino : fond uni légèrement moucheté */
    var img4=g.getImageData(0,0,S,S), d4=img4.data;
    for(var i=0;i<d4.length;i+=4){
      var n=(rnd()-0.5)*12;
      d4[i]=clamp255(d4[i]+n); d4[i+1]=clamp255(d4[i+1]+n); d4[i+2]=clamp255(d4[i+2]+n);
    }
    g.putImageData(img4,0,0);
    /* mouchetures discrètes */
    for(var k=0;k<120;k++){
      var c=mix(base,alt,rnd());
      g.fillStyle='rgba('+(c[0]|0)+','+(c[1]|0)+','+(c[2]|0)+',0.3)';
      g.fillRect(rnd()*S,rnd()*S,1+rnd()*2,1+rnd()*2);
    }
  }
  var out=g.getImageData(0,0,S,S);
  return {data:out.data, w:S, h:S};
}

/* getTexImage() : renvoie les pixels d'une texture par id, générée à la demande. */
function getTexImage(id){
  if(TEX_IMAGES[id]) return TEX_IMAGES[id];
  var def=TEXTURE_DEFS.filter(function(t){return t.id===id;})[0];
  if(def){ TEX_IMAGES[id]=genTextureCanvas(def); return TEX_IMAGES[id]; }
  return null;
}

/* ============================================================================
   3. MATHS 3D
   Petites fonctions vectorielles + caméra orbitale + projection perspective.
   ============================================================================ */
function dot(a,b){ return a[0]*b[0]+a[1]*b[1]+a[2]*b[2]; }
function sub(a,b){ return [a[0]-b[0], a[1]-b[1], a[2]-b[2]]; }
function cross(a,b){ return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]]; }
function norm(v){ var l=Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2]); return l<1e-9?[0,1,0]:[v[0]/l,v[1]/l,v[2]/l]; }

/* CAM = position de la caméra en coordonnées sphériques autour du meuble.
   r=distance, th=azimut, ph=élévation, ty=hauteur du point visé. */
var CAM = { r:4, th:-0.5, ph:1.0, ty:1.0 };

/* Direction de la lumière (pour l'ombrage des faces) */
var LIGHT = norm([0.5, 0.8, 0.35]);

/* getCam() : calcule la position 3D de la caméra + ses axes (droite/haut/avant)
   à partir des angles de CAM. Renvoie tout ce qu'il faut pour projeter. */
function getCam(){
  var r=CAM.r, th=CAM.th, ph=CAM.ph, ty=CAM.ty;
  var ex = r*Math.sin(ph)*Math.sin(th);
  var ey = ty + r*Math.cos(ph);
  var ez = r*Math.sin(ph)*Math.cos(th);
  var fwd   = norm([-ex, ty-ey, -ez]);          /* axe avant (vers la cible) */
  var right = norm(cross(fwd,[0,1,0]));          /* axe droite                */
  var up    = cross(right, fwd);                 /* axe haut                  */
  return {ex:ex, ey:ey, ez:ez, fwd:fwd, right:right, up:up};
}

/* proj() : projette un point 3D du monde vers un pixel 2D de l'écran.
   Renvoie {x,y,z} (z = profondeur, pour trier les faces) ou null si derrière. */
function proj(cam, p, W, H){
  var d = sub(p, [cam.ex, cam.ey, cam.ez]);
  var cx = dot(d, cam.right);
  var cy = dot(d, cam.up);
  var cz = dot(d, cam.fwd);
  if(cz < 0.01) return null;                      /* point derrière la caméra */
  var f = 2.14, asp = W/H;                         /* focale + ratio écran     */
  return { x: cx/cz*f/asp*(W/2)+(W/2), y: -cy/cz*f*(H/2)+(H/2), z: cz };
}

   Le meuble est construit comme un assemblage de boîtes (pavés).
   - FC[]   = liste des faces à dessiner (chaque face = 4 sommets + normale + couleur)
   - PRIMS[] = liste des boîtes "source" (sert plus tard pour l'export GDL/OBJ)
   ============================================================================ */
var FC = [];      /* faces pour le rendu      */
var PRIMS = [];   /* boîtes source pour export */
var DIMS = {w:1, h:1, d:1};  /* dimensions hors-tout du meuble en mètres */

/* box() : ajoute une boîte au modèle.
   (x,y,z) = centre de la boîte ; (w,h,d) = largeur/hauteur/profondeur ;
   col = couleur RVB ; al = opacité (1=opaque, <1=transparent type verre).
   La boîte est éclatée en 6 faces (FC) ET mémorisée comme primitive (PRIMS). */
/* _CURTEX : id de texture courante posée par les builders (null = aucune).
   box/boxV/face l'attachent aux faces qu'ils créent, pour le rendu texturé. */
var _CURTEX = null;
function box(x,y,z, w,h,d, col, al){
  al = al || 1;
  var hw=w/2, hh=h/2, hd=d/2;
  /* 8 sommets du pavé */
  var vt=[[x-hw,y-hh,z-hd],[x+hw,y-hh,z-hd],[x+hw,y+hh,z-hd],[x-hw,y+hh,z-hd],
          [x-hw,y-hh,z+hd],[x+hw,y-hh,z+hd],[x+hw,y+hh,z+hd],[x-hw,y+hh,z+hd]];
  /* 6 faces (indices de sommets) + normales correspondantes */
  var fi=[[0,1,2,3],[4,7,6,5],[0,3,7,4],[1,5,6,2],[0,4,5,1],[3,2,6,7]];
  var nm=[[0,0,-1],[0,0,1],[-1,0,0],[1,0,0],[0,-1,0],[0,1,0]];
  for(var i=0;i<6;i++){
    FC.push({ verts: fi[i].map(function(j){return vt[j];}), n:nm[i], col:col, al:al, tex:_CURTEX });
  }
  PRIMS.push({ x:x, y:y, z:z, w:w, h:h, d:d, col:col, al:al });
}

/* boxV() : construit un pavé à partir de 8 SOMMETS LIBRES (déjà positionnés),
   dans le même ordre que box() :
   0-3 = face avant (z-) bas-gauche, bas-droit, haut-droit, haut-gauche
   4-7 = face arrière (z+) idem.
   Permet des pavés déformés (extrémités coupées en biais). Les normales sont
   recalculées par face à partir des sommets réels. N'alimente pas PRIMS. */
function boxV(vt, col, al){
  al = al || 1;
  var fi=[[0,1,2,3],[4,7,6,5],[0,3,7,4],[1,5,6,2],[0,4,5,1],[3,2,6,7]];
  for(var i=0;i<6;i++){
    var p=fi[i].map(function(j){return vt[j];});
    /* normale = produit vectoriel de 2 arêtes de la face */
    var u=sub(p[1],p[0]), v=sub(p[3],p[0]), nf=norm(cross(u,v));
    FC.push({ verts:p, n:nf, col:col, al:al, tex:_CURTEX });
  }
}

/* boxCutBeam() : pavé orienté le long de X (poutre), de longueur L, section
   w (largeur Z) × hgt (hauteur Y), centré en Z=cz, base à yBase.
   Coupes aux 2 extrémités selon angG (gauche, x=-L/2) et angD (droite, x=+L/2).
   - type 'sifflet' : biais vertical -> le haut du bout recule en X selon l'angle
   - type 'onglet'  : le bout pivote dans le plan horizontal -> décalage en X selon Z
   angles en degrés (0 = coupe droite). */
/* boxCutBeam() : pavé orienté le long de X (poutre), de longueur L, section
   w (largeur Z) × hgt (hauteur Y), base à yBase, centré en Z=cz.
   Coupes aux 2 extrémités selon angG (gauche) et angD (droite).
   IMPORTANT : le plan de coupe est GLOBAL au profil. Le décalage dépend de la
   position Y absolue par rapport à yRef (référence commune à tous les rectangles
   d'un même profil), sinon chaque semelle serait coupée à un endroit différent.
   - type 'sifflet' : biais vertical -> décalage X = (y - yRef) * tan(angle)
   - type 'onglet'  : décalage X = (z - cz) * tan(angle) (plan vertical pivoté) */
function boxCutBeam(L, cz, w, hgt, yBase, type, angG, angD, col, al, yRef){
  var x0=-L/2, x1=L/2;
  var y0=yBase, y1=yBase+hgt;
  var z0=cz-w/2, z1=cz+w/2;
  var yr=(yRef===undefined)?yBase:yRef;     /* référence globale du plan de coupe */
  var tG=Math.tan(angG*Math.PI/180), tD=Math.tan(angD*Math.PI/180);
  function dxG(y,z){
    if(type==='sifflet') return  (y-yr)*tG;   /* plan incliné global */
    return (z-cz)*tG;                          /* onglet : selon Z */
  }
  function dxD(y,z){
    if(type==='sifflet') return -(y-yr)*tD;
    return -(z-cz)*tD;
  }
  var vt=[
    [x0+dxG(y0,z0), y0, z0], [x1+dxD(y0,z0), y0, z0], [x1+dxD(y1,z0), y1, z0], [x0+dxG(y1,z0), y1, z0],
    [x0+dxG(y0,z1), y0, z1], [x1+dxD(y0,z1), y0, z1], [x1+dxD(y1,z1), y1, z1], [x0+dxG(y1,z1), y1, z1]
  ];
  boxV(vt, col, al);
}

/* boxCutPost() : pavé vertical (poteau) le long de Y, base à Y=0, hauteur H,
   section a (X) × b (Z) centrée en (0,0). Coupe inclinée en TÊTE selon angTete :
   la face du haut suit une pente (inclinaison autour de l'axe Z), le sommet le
   plus haut est du côté +X. angle en degrés. */
function boxCutPost(H, a, b, angTete, col, al){
  var t=Math.tan(angTete*Math.PI/180);
  var hw=a/2, hd=b/2;
  /* le haut est incliné : hauteur = H + x*tan(angle), donc +x monte, -x descend */
  function topY(x){ return H + x*t; }
  var vt=[
    [-hw,0,-hd], [hw,0,-hd], [hw,topY(hw),-hd], [-hw,topY(-hw),-hd],
    [-hw,0, hd], [hw,0, hd], [hw,topY(hw), hd], [-hw,topY(-hw), hd]
  ];
  boxV(vt, col, al);
}

/* boxPorte() : crée une porte (pavé) qui PIVOTE autour d'une charnière verticale.
   - cx,cy,cz : centre de la porte fermée
   - w,h,d    : dimensions
   - hingeX   : position X de la charnière (bord de pivot)
   - hingeZ   : position Z de la charnière (≈ plan de façade)
   - ang      : angle d'ouverture en radians
   - sens     : +1 ou -1 (sens de rotation selon le vantail)
   La rotation se fait autour de l'axe vertical (Y) passant par (hingeX,hingeZ). */
function boxPorte(cx,cy,cz, w,h,d, hingeX,hingeZ, ang, sens, col, al){
  al = al || 1;
  var hw=w/2, hh=h/2, hd=d/2;
  var vt=[[cx-hw,cy-hh,cz-hd],[cx+hw,cy-hh,cz-hd],[cx+hw,cy+hh,cz-hd],[cx-hw,cy+hh,cz-hd],
          [cx-hw,cy-hh,cz+hd],[cx+hw,cy-hh,cz+hd],[cx+hw,cy+hh,cz+hd],[cx-hw,cy+hh,cz+hd]];
  /* rotation autour de l'axe Y passant par (hingeX,hingeZ) */
  var ca=Math.cos(sens*ang), sa=Math.sin(sens*ang);
  function rot(p){
    var dx=p[0]-hingeX, dz=p[2]-hingeZ;
    return [ hingeX + dx*ca - dz*sa, p[1], hingeZ + dx*sa + dz*ca ];
  }
  var rv=vt.map(rot);
  var fi=[[0,1,2,3],[4,7,6,5],[0,3,7,4],[1,5,6,2],[0,4,5,1],[3,2,6,7]];
  var nmBase=[[0,0,-1],[0,0,1],[-1,0,0],[1,0,0],[0,-1,0],[0,1,0]];
  /* les normales pivotent aussi (autour de Y) */
  function rotN(n){ return [ n[0]*ca - n[2]*sa, n[1], n[0]*sa + n[2]*ca ]; }
  for(var i=0;i<6;i++){
    FC.push({ verts: fi[i].map(function(j){return rv[j];}), n:rotN(nmBase[i]), col:col, al:al });
  }
}

/* buildMeuble() : construit le meuble entier à partir des paramètres P.
   Repère : origine au sol, centré en X et Z, le meuble monte selon +Y.
   Tout est en mètres (les paramètres sont en cm -> /100).
   Renvoie les dimensions hors-tout. */
function buildMeuble(){
  var w=P.w/100, h=P.h/100, d=P.d/100;  /* cm -> m */
  var t = 0.02;                          /* épaisseur des panneaux (2 cm) */
  var cCorps = colCorps();               /* finition du caisson  */
  var cEtag  = colEtagere();             /* finition des étagères */
  var cPorte = colPorte();               /* teinte du verre porte */

  /* --- Caisson : 2 panneaux horizontaux (bas/haut) + 2 montants + fond --- */
  _CURTEX = FINISH_TEX.corps;
  box(0,    t/2,     0, w, t, d, cCorps);          /* panneau bas    */
  box(0,    h-t/2,   0, w, t, d, cCorps);          /* panneau haut   */
  box(-w/2+t/2, h/2, 0, t, h, d, cCorps);          /* montant gauche */
  box( w/2-t/2, h/2, 0, t, h, d, cCorps);          /* montant droit  */
  box(0, h/2, -d/2+t/2, w-t*2, h-t*2, t, cCorps);  /* fond           */

  /* --- Étagères : léger retrait de façade (réaliste) ; le verre est géré
     correctement par le z-buffer donc un petit retrait suffit. --- */
  _CURTEX = FINISH_TEX.etagere;
  if(P.sh > 0){
    var gap = (h - t*2) / (P.sh + 1);            /* espacement vertical */
    var shDepth = d - t - 0.03;                  /* profondeur étagère (retrait 3cm) */
    var shZ = -0.015;                            /* léger décalage vers le fond     */
    for(var i=1; i<=P.sh; i++){
      box(0, t + gap*i, shZ, w-t*2, t*0.8, shDepth, cEtag);
    }
  }

  /* --- Portes : verre transparent teinté, PIVOTANTES autour de leur charnière.
     Chaque vantail tourne autour de son bord extérieur (les portes s'ouvrent en
     s'écartant vers l'extérieur). L'angle est piloté par DOOR_OPEN (degrés). --- */
  if(P.dr > 0){
    var ang = DOOR_OPEN * Math.PI/180;           /* angle en radians */
    var dw = (w - t*2)/P.dr - 0.005;             /* largeur d'une porte */
    var zFace = d/2 + t*0.5;                      /* plan de façade des portes */
    for(var i=0; i<P.dr; i++){
      var xp = -w/2 + t + (dw+0.005)*i + dw/2;   /* centre X de la porte fermée */
      /* charnière au bord extérieur : porte de gauche pivote sur son bord gauche
         (et s'ouvre vers la gauche), porte de droite sur son bord droit. La
         charnière la plus proche du bord du meuble. */
      var leftHalf = (xp < 0);
      var hingeX = leftHalf ? (xp - dw/2) : (xp + dw/2);
      var sens   = leftHalf ? 1 : -1;            /* sens d'ouverture vers l'avant */
      boxPorte(xp, h/2, zFace, dw, h-t*2-0.01, t*0.8, hingeX, zFace, ang, sens, cPorte, 0.30);
    }
  }

  DIMS = {w:w, h:h, d:d};
  return DIMS;
}

/* buildMur() : construit le mur multicouche à partir des paramètres PM.
   Repère : mur centré en X (longueur) et Z (épaisseur), monte selon +Y.
   Les couches s'empilent en Z (profondeur), de l'extérieur (Z+) vers
   l'intérieur (Z-). On calcule d'abord l'épaisseur totale pour centrer le mur,
   puis on pose chaque couche active comme une boîte.
   Mémorise WALL_LAYERS (liste des couches actives) pour la cotation. */
var WALL_LAYERS = [];
function buildMur(){
  var L = PM.len/100, H = PM.hgt/100;       /* longueur, hauteur (m) */

  /* couche porteuse : couleur selon le matériau choisi */
  var coreMat = WALL_CORE_MATS.filter(function(m){return m.id===PM.coreMat;})[0] || WALL_CORE_MATS[0];

  /* liste ordonnée des couches actives (extérieur -> intérieur) avec épaisseur(m) */
  var layers=[];
  function add(id, label, thicknessCm, col){
    if(thicknessCm>0) layers.push({id:id, label:label, t:thicknessCm/100, col:col});
  }
  add('finExt', 'Finition ext.',  PM.finExt,                       WALL_COL.finExt);
  if(PM.isoExtOn) add('isoExt', 'Isolation ext.', PM.isoExt,       WALL_COL.isoExt);
  add('core',   coreMat.l,        PM.core,                          coreMat.c);
  if(PM.isoIntOn) add('isoInt', 'Isolation int.', PM.isoInt,       WALL_COL.isoInt);
  add('finInt', 'Finition int.',  PM.finInt,                        WALL_COL.finInt);

  /* épaisseur totale -> pour centrer le mur en Z */
  var total=0; layers.forEach(function(ly){ total+=ly.t; });

  /* on empile depuis l'extérieur (Z = +total/2) vers l'intérieur (Z négatif) */
  var z = total/2;
  layers.forEach(function(ly){
    var zc = z - ly.t/2;                     /* centre Z de la couche */
    box(0, H/2, zc, L, H, ly.t, ly.col, 1);  /* couche = pavé plein   */
    ly.zCenter = zc;                          /* mémorisé pour la cotation */
    ly.zFront  = z;                           /* face extérieure de la couche */
    z -= ly.t;
  });

  WALL_LAYERS = layers;
  DIMS = { w:L, h:H, d:total };
  return DIMS;
}

/* buildDalle() : construit la dalle multicouche à partir des paramètres PD.
   Repère : dalle centrée en X (longueur) et Z (largeur), couches empilées en Y
   (hauteur), de bas en haut. La base de la dalle est posée à Y=0.
   Mémorise SLAB_LAYERS (couches actives) pour la cotation. */
var SLAB_LAYERS = [];
function buildDalle(){
  var L = PD.len/100, W = PD.wid/100;        /* longueur, largeur (m) */

  var coreMat = SLAB_CORE_MATS.filter(function(m){return m.id===PD.coreMat;})[0] || SLAB_CORE_MATS[0];

  /* couches actives de bas en haut, avec épaisseur (m) */
  var layers=[];
  function add(id, label, thicknessCm, col){
    if(thicknessCm>0) layers.push({id:id, label:label, t:thicknessCm/100, col:col});
  }
  if(PD.plafOn) add('plafond', 'Plafond/sous-face', PD.plaf, SLAB_COL.plafond);
  add('core',  coreMat.l,    PD.core,              coreMat.c);
  if(PD.isoOn) add('iso', 'Isolation', PD.iso,     SLAB_COL.iso);
  add('chape', 'Chape',      PD.chape,             SLAB_COL.chape);
  add('revet', 'Revêtement', PD.revet,             SLAB_COL.revet);

  /* épaisseur totale (hauteur du complexe de dalle) */
  var total=0; layers.forEach(function(ly){ total+=ly.t; });

  /* empile de bas (Y=0) en haut */
  var y=0;
  layers.forEach(function(ly){
    var yc = y + ly.t/2;                     /* centre Y de la couche */
    box(0, yc, 0, L, ly.t, W, ly.col, 1);    /* couche = pavé plein   */
    ly.yCenter = yc;
    ly.yBottom = y;
    y += ly.t;
  });

  SLAB_LAYERS = layers;
  /* DIMS : w=longueur, h=épaisseur totale (hauteur visible), d=largeur.
     Pour la visée caméra on garde h = épaisseur (objet plat). */
  DIMS = { w:L, h:total, d:W };
  return DIMS;
}

/* buildPoteau() : poteau vertical, section carrée/rectangulaire/ronde. */
/* profileRects() : décompose la section d'un profil en RECTANGLES (formes
   convexes), chacun défini par [cx, cy, w, h] (centre + dimensions, en m).
   Un profil en I/H = 3 rectangles (semelle basse, âme, semelle haute).
   Un U = 3 rectangles (dos vertical + 2 ailes horizontales).
   Cette décomposition évite de trianguler un polygone concave (source du bug).
   dims = [h,b,tw,tf] en mm. */
function profileRects(type, dims){
  var h=dims[0]/1000, b=dims[1]/1000, tw=dims[2]/1000, tf=dims[3]/1000;
  var hh=h/2;
  if(type==='U'){
    /* U ouvert vers +x : dos vertical à gauche + 2 ailes vers la droite */
    var x0=-b/2;                         /* face extérieure du dos */
    var dosCx=x0+tw/2;
    var aileCx=x0+ (b)/2;                /* centre des ailes (dos -> bord) */
    var aileW=b - tw;                    /* largeur de l'aile au-delà du dos */
    var aileCx2=x0+tw + aileW/2;
    return [
      [dosCx, 0, tw, h],                 /* dos (âme verticale) */
      [aileCx2, hh-tf/2, aileW, tf],     /* aile haute */
      [aileCx2, -hh+tf/2, aileW, tf]     /* aile basse */
    ];
  }
  /* I/H : semelle basse, âme centrale, semelle haute */
  return [
    [0, -hh+tf/2, b, tf],                /* semelle basse */
    [0, 0, tw, h-2*tf],                  /* âme */
    [0, hh-tf/2, b, tf]                  /* semelle haute */
  ];
}

/* extrudeRect() : extrude un rectangle de section [cx,cy,w,h] le long d'un axe,
   en un pavé. axis='Y' (vertical) ou 'X' (horizontal). yOffset décale la section
   (utile pour poser une poutre sur sa base). */
function extrudeRect(rect, L, axis, col, yOffset){
  var cx=rect[0], cy=rect[1]+ (yOffset||0), w=rect[2], hgt=rect[3];
  if(axis==='Y'){
    /* poteau : section dans XZ (x=cx large w, z=cy épais hgt), monte en Y sur L */
    box(cx, L/2, cy, w, L, hgt, col, 1);
  } else {
    /* poutre : section dans YZ (y=cy hauteur hgt, z=cx largeur w), file en X sur L */
    box(0, cy, cx, L, hgt, w, col, 1);
  }
}

/* steelDims() : renvoie les cotes [h,b,tw,tf] et le type d'un profil choisi. */
function steelDims(serie, taille){
  var s=STEEL_PROFILES[serie];
  if(!s || !s.sizes[taille]){ s=STEEL_PROFILES.IPE; taille=300; }
  return { type:s.type, dims:s.sizes[taille] || STEEL_PROFILES[serie].sizes[steelSizes(serie)[0]] };
}

function buildPoteau(){
  var a=PP.sa/100, b=(PP.forme==='carre'?PP.sa:PP.sb)/100, h=PP.h/100;
  var mat=POST_MATS.filter(function(m){return m.id===PP.mat;})[0]||POST_MATS[0];
  var c=mat.c;
  var aT=PP.coupeTete||0;   /* angle de coupe en tête */
  /* ACIER + profil normalisé : on assemble le vrai profil (I ou U) en vertical */
  if(PP.mat==='acier' && PP.profilSerie){
    var sd=steelDims(PP.profilSerie, PP.profilTaille);
    var rects=profileRects(sd.type, sd.dims);
    rects.forEach(function(rc){
      /* chaque rectangle : section dans XZ (x=rc[0] large rc[2], z=rc[1] épais rc[3]) */
      buildPostRectCut(rc[0], rc[1], rc[2], rc[3], h, aT, STEEL_COL);
    });
    DIMS={ w:sd.dims[1]/1000, h:h, d:sd.dims[0]/1000 };
    return DIMS;
  }
  if(PP.forme==='rond'){
    /* section ronde : cylindre (rayon = sa/2), normales radiales lissées.
       Coupe en tête non appliquée au rond (tête droite). */
    var r=a/2, SEG=64, top=[], bot=[];
    for(var i=0;i<SEG;i++){
      var a0=2*PI*i/SEG, a1=2*PI*(i+1)/SEG, am=(a0+a1)/2;
      var n0=[cos(a0),0,sin(a0)], n1=[cos(a1),0,sin(a1)];
      face([
        [r*cos(a0),0,r*sin(a0)],[r*cos(a1),0,r*sin(a1)],
        [r*cos(a1),h,r*sin(a1)],[r*cos(a0),h,r*sin(a0)]
      ], [cos(am),0,sin(am)], c, 1, [n0,n1,n1,n0]);
      top.push([r*cos(a0),h,r*sin(a0)]);
      bot.unshift([r*cos(a0),0,r*sin(a0)]);
    }
    face(top,[0,1,0],c); face(bot,[0,-1,0],c);
    DIMS={w:2*r,h:h,d:2*r};
  } else {
    /* section carrée/rectangulaire, coupée en tête */
    buildPostRectCut(0, 0, a, b, h, aT, c);
    DIMS={w:a,h:h,d:b};
  }
  return DIMS;
}

/* buildPostRectCut() : pavé vertical (un rectangle de section du poteau) posé
   base à Y=0, centré en (cx,cz) dans le plan, de section w(X)×dd(Z), hauteur H,
   avec coupe inclinée en tête d'angle angTete. Sous-fonction du poteau. */
function buildPostRectCut(cx, cz, w, dd, H, angTete, col){
  var t=Math.tan((angTete||0)*Math.PI/180);
  var hw=w/2, hd=dd/2;
  /* hauteur de tête variable selon X (la tête suit une pente autour de l'axe Z) */
  function topY(x){ return H + x*t; }
  var x0=cx-hw, x1=cx+hw, z0=cz-hd, z1=cz+hd;
  var vt=[
    [x0,0,z0],[x1,0,z0],[x1,topY(x1),z0],[x0,topY(x0),z0],
    [x0,0,z1],[x1,0,z1],[x1,topY(x1),z1],[x0,topY(x0),z1]
  ];
  boxV(vt, col, 1);
}

/* buildPoutre() : poutre horizontale à section rectangulaire, posée selon X. */
function buildPoutre(){
  var L=PB.len/100, b=PB.b/100, hs=PB.hs/100;
  var mat=BEAM_MATS.filter(function(m){return m.id===PB.mat;})[0]||BEAM_MATS[0];
  var type=PB.coupeType, aG=PB.angG, aD=PB.angD;
  /* ACIER + profil normalisé : on assemble le vrai profil le long de X, coupé */
  if(PB.mat==='acier' && PB.profilSerie){
    var sd=steelDims(PB.profilSerie, PB.profilTaille);
    var rects=profileRects(sd.type, sd.dims);
    var hProfil=sd.dims[0]/1000;
    /* plan de coupe global : référence = milieu de la hauteur du profil.
       Tous les rectangles utilisent le MÊME yRef pour être coupés au même plan. */
    var yRef=hProfil/2;
    rects.forEach(function(rc){
      var cz=rc[0], cyBase=rc[1]+hProfil/2 - rc[3]/2, w=rc[2], hgt=rc[3];
      boxCutBeam(L, cz, w, hgt, cyBase, type, aG, aD, STEEL_COL, 1, yRef);
    });
    DIMS={ w:L, h:hProfil, d:sd.dims[1]/1000 };
    return DIMS;
  }
  /* poutre béton/bois : section rectangulaire pleine, coupée (réf = milieu hauteur) */
  boxCutBeam(L, 0, b, hs, 0, type, aG, aD, mat.c, 1, hs/2);
  DIMS={w:L, h:hs, d:b};
  return DIMS;
}

/* buildGardeCorps() : main courante + montants verticaux + remplissage
   (barreaudage vertical ou lisses horizontales). */
/* buildQuadripod() : construit l'objet importé du fabricant Architecture-AL Design.
   Lit la géométrie pré-convertie QUADRIPOD (sommets + faces + matériaux) et
   alimente FC. Échelle réelle (mètres), déjà recentré et posé sur le sol. */
function buildQuadripod(){
  var V=QUADRIPOD.V, M=QUADRIPOD.M, F=QUADRIPOD.F;
  var maxY=0;
  /* Finitions revisitées :
     - matériau 0 (pieds) -> CHROME (gris métallique clair, brillant)
     - matériau 1 (assise) -> TISSU ÉPAIS ORANGE (texture textile teintée) */
  var CHROME=[212,216,222];
  var TISSU_ORANGE=[224,118,40];
  for(var i=0;i<F.length;i++){
    var f=F[i];                       /* [matIndex, [normale], [indices]] */
    var verts=[];
    var idxs=f[2];
    for(var k=0;k<idxs.length;k++){
      var v=V[idxs[k]];
      verts.push(v);
      if(v[1]>maxY) maxY=v[1];
    }
    var col, tex=null;
    if(f[0]===0){ col=TISSU_ORANGE; tex='tissu_orange'; }  /* assise tissu orange */
    else { col=CHROME; }                                   /* pieds chrome */
    FC.push({ verts:verts, n:f[1], col:col, al:1, tex:tex });
  }
  DIMS={ w:0.42, h:maxY, d:0.42 };
  return DIMS;
}

/* PRODUCT : produit fabricant actuellement affiché (tous fabricants confondus).
   La liste des produits est définie dans le registre CATALOG (subs des fabricants). */
var AL_PRODUCT = 'quadripod';

/* buildWoo() : desserte à roulettes. Corps Corian blanc, roulettes caoutchouc
   noir, axes aluminium. Géométrie pré-convertie WOO. */
function buildWoo(){
  var V=WOO.V, F=WOO.F;
  var maxY=0;
  var CORIAN=[238,238,234];      /* corps Corian blanc */
  var CAOUTCHOUC=[36,36,38];     /* roulettes caoutchouc noir */
  var ALU=[182,186,190];         /* axes aluminium */
  for(var i=0;i<F.length;i++){
    var f=F[i];
    var verts=[], idxs=f[2];
    for(var k=0;k<idxs.length;k++){
      var v=V[idxs[k]];
      verts.push(v);
      if(v[1]>maxY) maxY=v[1];
    }
    var col, tex=null;
    if(f[0]===0){ col=CORIAN; }                          /* corps Corian */
    else if(f[0]===1){ col=CAOUTCHOUC; tex='caoutchouc'; }/* roulettes */
    else { col=ALU; }                                    /* axes alu */
    FC.push({ verts:verts, n:f[1], col:col, al:1, tex:tex });
  }
  DIMS={ w:0.80, h:maxY, d:1.20 };
  return DIMS;
}

/* buildBureau() : poste de travail administratif (Haworth). Maillage optimisé QEM.
   Bureau + caisson + siège ergonomique. Couleurs d'origine (palette M). */
function buildBureau(){
  var V=BUREAU.V, M=BUREAU.M, F=BUREAU.F;
  var maxY=0;
  for(var i=0;i<F.length;i++){
    var f=F[i];                       /* [indexCouleur, normale, [sommets]] */
    var col=M[f[0]] || [150,150,150];
    var verts=[], idxs=f[2];
    for(var k=0;k<idxs.length;k++){
      var v=V[idxs[k]];
      verts.push(v);
      if(v[1]>maxY) maxY=v[1];
    }
    FC.push({ verts:verts, n:f[1], col:col, al:1, tex:null });
  }
  DIMS={ w:2.51, h:maxY, d:1.87 };
  return DIMS;
}

function buildGardeCorps(){
  var L=PG.len/100, H=PG.h/100;
  var mat=RAIL_MATS.filter(function(m){return m.id===PG.mat;})[0]||RAIL_MATS[0];
  var c=mat.c;
  var sec=0.04;            /* section des profilés (4 cm) */
  var hc=0.045;            /* épaisseur main courante     */

  /* main courante (en haut, sur toute la longueur) */
  box(0, H-hc/2, 0, L, hc, sec*1.2, c, 1);

  /* montants verticaux structurels (répartis) */
  var nM=Math.max(2, PG.nMontants);
  for(var i=0;i<nM;i++){
    var x = -L/2 + sec/2 + (L-sec)*(i/(nM-1));
    box(x, (H-hc)/2, 0, sec, H-hc, sec, c, 1);
  }

  /* remplissage */
  if(PG.remplissage==='barreaux'){
    /* barreaudage vertical : barreaux fins régulièrement espacés */
    var nB=Math.max(2, PG.nBarreaux), bw=0.018;
    for(var i=0;i<nB;i++){
      var x=-L/2 + sec + (L-2*sec)*(i/(nB-1));
      box(x, (H-hc)/2, 0, bw, H-hc, bw, c, 1);
    }
  } else {
    /* lisses horizontales : barres horizontales empilées */
    var nL=Math.max(2, PG.nBarreaux), lh=0.02;
    for(var i=0;i<nL;i++){
      var y=0.04 + (H-hc-0.04)*(i/(nL-1));
      box(0, y, 0, L-sec, lh, lh, c, 1);
    }
  }
  DIMS={w:L, h:H, d:sec};
  return DIMS;
}

/* face() : ajoute une face polygonale libre (pour les formes courbes).
   verts = liste de sommets 3D ; n = normale de face ; col = couleur ; al = opacité.
   vn (optionnel) = normales PAR SOMMET. Quand fournies, le rendu fait un ombrage
   lissé (Gouraud) qui fond les facettes entre elles. Sans vn, ombrage plat.
   Contrairement à box(), n'alimente PAS PRIMS. */
function face(verts, n, col, al, vn){
  FC.push({ verts:verts, n:n, col:col, al:al||1, vn:vn||null, tex:_CURTEX });
}

/* ----------------------------------------------------------------------------
   BUILDERS DE FORMES
   Chaque fonction construit une forme centrée, posée au sol (base à Y=0),
   à partir des paramètres PF (w,h,d en cm). Renvoie les dimensions hors-tout.
   La résolution (nombre de facettes) est choisie pour un bon compromis
   lissé / performance sur mobile.
   ---------------------------------------------------------------------------- */
var PI=Math.PI, cos=Math.cos, sin=Math.sin;

/* CUBE : simple pavé (réutilise box) */
function buildCube(){
  var w=PF.w/100, h=PF.h/100, d=PF.d/100;
  box(0, h/2, 0, w, h, d, colForme());
  DIMS={w:w,h:h,d:d}; return DIMS;
}

/* SPHÈRE : maillage latitude/longitude. Rayon = plus petite dimension /2. */
function buildSphere(){
  var w=PF.w/100, h=PF.h/100, d=PF.d/100, r=Math.min(w,h,d)/2;
  var LAT=36, LON=64, c=colForme();
  /* nS(t,a) : normale unitaire exacte de la sphère (= direction radiale) */
  function nS(t,a){ return [sin(t)*cos(a), -cos(t), sin(t)*sin(a)]; }
  for(var j=0;j<LAT;j++){
    var t0=PI*j/LAT, t1=PI*(j+1)/LAT;
    for(var i=0;i<LON;i++){
      var a0=2*PI*i/LON, a1=2*PI*(i+1)/LON;
      var tm=(t0+t1)/2, am=(a0+a1)/2;
      face([
        [r*sin(t0)*cos(a0), r-r*cos(t0), r*sin(t0)*sin(a0)],
        [r*sin(t0)*cos(a1), r-r*cos(t0), r*sin(t0)*sin(a1)],
        [r*sin(t1)*cos(a1), r-r*cos(t1), r*sin(t1)*sin(a1)],
        [r*sin(t1)*cos(a0), r-r*cos(t1), r*sin(t1)*sin(a0)]
      ], [sin(tm)*cos(am), -cos(tm), sin(tm)*sin(am)], c, 1,
      [ nS(t0,a0), nS(t0,a1), nS(t1,a1), nS(t1,a0) ]);
    }
  }
  DIMS={w:2*r,h:2*r,d:2*r}; return DIMS;
}

/* CYLINDRE : tube + 2 disques (haut/bas). Rayon = min(w,d)/2, hauteur h. */
function buildCylindre(){
  var w=PF.w/100, h=PF.h/100, d=PF.d/100, r=Math.min(w,d)/2;
  var SEG=96, c=colForme(), top=[], bot=[];
  for(var i=0;i<SEG;i++){
    var a0=2*PI*i/SEG, a1=2*PI*(i+1)/SEG, am=(a0+a1)/2;
    /* normales par sommet = direction radiale (lisse la paroi) */
    var n0=[cos(a0),0,sin(a0)], n1=[cos(a1),0,sin(a1)];
    face([
      [r*cos(a0),0,r*sin(a0)], [r*cos(a1),0,r*sin(a1)],
      [r*cos(a1),h,r*sin(a1)], [r*cos(a0),h,r*sin(a0)]
    ], [cos(am),0,sin(am)], c, 1, [n0,n1,n1,n0]);
    top.push([r*cos(a0),h,r*sin(a0)]);
    bot.unshift([r*cos(a0),0,r*sin(a0)]);
  }
  face(top, [0,1,0], c);   /* disque du dessus (plat) */
  face(bot, [0,-1,0], c);  /* disque du dessous (plat) */
  DIMS={w:2*r,h:h,d:2*r}; return DIMS;
}

/* CÔNE : surface conique + disque de base. */
function buildCone(){
  var w=PF.w/100, h=PF.h/100, d=PF.d/100, r=Math.min(w,d)/2;
  var SEG=96, c=colForme(), L=Math.sqrt(h*h+r*r), bot=[];
  for(var i=0;i<SEG;i++){
    var a0=2*PI*i/SEG, a1=2*PI*(i+1)/SEG, am=(a0+a1)/2;
    /* normales par sommet sur la pente (lisse le côté du cône) */
    var n0=[cos(a0)*h/L, r/L, sin(a0)*h/L], n1=[cos(a1)*h/L, r/L, sin(a1)*h/L];
    face([
      [r*cos(a0),0,r*sin(a0)], [r*cos(a1),0,r*sin(a1)], [0,h,0]
    ], [cos(am)*h/L, r/L, sin(am)*h/L], c, 1, [n0,n1,n1]);
    bot.unshift([r*cos(a0),0,r*sin(a0)]);
  }
  face(bot, [0,-1,0], c);  /* disque de base (plat) */
  DIMS={w:2*r,h:h,d:2*r}; return DIMS;
}

/* PRISME : prisme triangulaire (section triangle, extrudé en profondeur). */
function buildPrisme(){
  var w=PF.w/100, h=PF.h/100, d=PF.d/100, hw=w/2, hd=d/2, c=colForme();
  face([[-hw,0,-hd],[hw,0,-hd],[hw,0,hd],[-hw,0,hd]], [0,-1,0], c); /* base */
  face([[-hw,0,-hd],[hw,0,-hd],[0,h,-hd]], [0,0,-1], c);            /* pignon avant */
  face([[hw,0,hd],[-hw,0,hd],[0,h,hd]], [0,0,1], c);               /* pignon arrière */
  face([[-hw,0,-hd],[-hw,0,hd],[0,h,hd],[0,h,-hd]], norm([-h,hw,0]), c); /* pan gauche */
  face([[hw,0,-hd],[0,h,-hd],[0,h,hd],[hw,0,hd]], norm([h,hw,0]), c);    /* pan droit */
  DIMS={w:w,h:h,d:d}; return DIMS;
}

/* TORE : anneau. R = rayon majeur, r2 = rayon du tube. */
function buildTore(){
  var w=PF.w/100, h=PF.h/100, d=PF.d/100;
  var R=Math.min(w,d)/2*0.65, r2=Math.min(w,d)/2*0.28;
  var MAJ=96, MIN=48, c=colForme();
  /* nrmTore(A,B) : normale unitaire exacte du tore au paramètre (A majeur, B mineur) */
  function nT(A,B){ return [cos(B)*cos(A), sin(B), cos(B)*sin(A)]; }
  for(var j=0;j<MAJ;j++){
    var A0=2*PI*j/MAJ, A1=2*PI*(j+1)/MAJ, Am=(A0+A1)/2;
    for(var i=0;i<MIN;i++){
      var B0=2*PI*i/MIN, B1=2*PI*(i+1)/MIN, Bm=(B0+B1)/2;
      face([
        [R*cos(A0)+r2*cos(B0)*cos(A0), h/2+r2*sin(B0), R*sin(A0)+r2*cos(B0)*sin(A0)],
        [R*cos(A1)+r2*cos(B0)*cos(A1), h/2+r2*sin(B0), R*sin(A1)+r2*cos(B0)*sin(A1)],
        [R*cos(A1)+r2*cos(B1)*cos(A1), h/2+r2*sin(B1), R*sin(A1)+r2*cos(B1)*sin(A1)],
        [R*cos(A0)+r2*cos(B1)*cos(A0), h/2+r2*sin(B1), R*sin(A0)+r2*cos(B1)*sin(A0)]
      ], [cos(Bm)*cos(Am), sin(Bm), cos(Bm)*sin(Am)], c, 1,
      /* normales par sommet (exactes) -> ombrage lissé */
      [ nT(A0,B0), nT(A1,B0), nT(A1,B1), nT(A0,B1) ]);
    }
  }
  DIMS={w:2*(R+r2), h:2*r2, d:2*(R+r2)}; return DIMS;
}

/* Table de correspondance forme -> builder */
var SHAPE_BLD = {
  cube:buildCube, sphere:buildSphere, cylindre:buildCylindre,
  cone:buildCone, prisme:buildPrisme, tore:buildTore
};

/* build() : reconstruit l'objet courant selon le mode actif (meuble ou forme).
   C'est LE point d'entrée unique appelé à chaque changement de paramètre. */
/* ============================================================================
   PORTE — configurateur paramétrique (catégorie générique)
   Types : simple battant / double battant / coulissante / pliante.
   Dormant, styles de vantail (plein, mouluré, vitré), vitrage + meneaux,
   imposte, poignée, et ouverture (angle / glissement / pliage).
   Repère : origine au sol, centré en X, épaisseur du mur le long de Z.
   ============================================================================ */
var PPORTE = {
  type:'simple', w:93, h:204, lt:4,
  frame:true, fw:6, fd:12,
  panel:'plein', mv:1, mh:1,
  imposteOn:false, imposte:40,
  handle:true, handleType:'bequille', handleH:105,
  open:18
};
/* rotation autour d'un axe vertical en (hx, z=0) */
function rotT(hx,a,sens){ var c=Math.cos(sens*a), s=Math.sin(sens*a);
  return function(p){ var dx=p[0]-hx, dz=p[2]; return [hx+dx*c-dz*s, p[1], dx*s+dz*c]; }; }
function rotAbout(cx,ang){ var c=Math.cos(ang), s=Math.sin(ang);
  return function(p){ var dx=p[0]-cx, dz=p[2]; return [cx+dx*c-dz*s, p[1], dx*s+dz*c]; }; }
/* basculement autour d'un axe horizontal X passant par (y=hy, z=0) — oscillo/soufflet */
function rotXT(hy,a,sens){ var c=Math.cos(sens*a), s=Math.sin(sens*a);
  return function(p){ var dy=p[1]-hy, dz=p[2]; return [p[0], hy+dy*c-dz*s, dy*s+dz*c]; }; }
/* boîte construite en position "fermée" puis passée dans la transformation T du vantail */
function leafBox(T, cx,cy,cz, w,h,d, col, al){
  if(w<=0||h<=0||d<=0) return;
  var hw=w/2,hh=h/2,hd=d/2;
  var vt=[[cx-hw,cy-hh,cz-hd],[cx+hw,cy-hh,cz-hd],[cx+hw,cy+hh,cz-hd],[cx-hw,cy+hh,cz-hd],
          [cx-hw,cy-hh,cz+hd],[cx+hw,cy-hh,cz+hd],[cx+hw,cy+hh,cz+hd],[cx-hw,cy+hh,cz+hd]];
  boxV(vt.map(T), col, al);
}
/* construit un vantail (cadre + remplissage) dans [x0,x1]x[y0,y1], épaisseur lt,
   plan z=zc, via la transformation T. handleEdge=+1 -> poignée côté x1, -1 -> x0. */
function buildFramedLeaf(T, x0,x1,y0,y1,zc,lt,style,colL,colP,colG,colH, handleEdge, handle, handleY){
  var lw=x1-x0, lh=y1-y0, cx=(x0+x1)/2;
  _CURTEX=FINISH_TEX.panneau;                              /* matiere "Panneau" */
  if(style==='plein'){
    leafBox(T, cx,(y0+y1)/2,zc, lw,lh,lt, colL,1);
  } else {
    var sw=Math.min(0.11, lw*0.18);
    leafBox(T, x0+sw/2,(y0+y1)/2,zc, sw,lh,lt, colL,1);
    leafBox(T, x1-sw/2,(y0+y1)/2,zc, sw,lh,lt, colL,1);
    leafBox(T, cx,y1-sw/2,zc, lw,sw,lt, colL,1);
    leafBox(T, cx,y0+sw/2,zc, lw,sw,lt, colL,1);
    var ix0=x0+sw, ix1=x1-sw, iy0=y0+sw, iy1=y1-sw, iw=ix1-ix0, ih=iy1-iy0, icx=(ix0+ix1)/2;
    var rows;
    if(style==='moulure')         rows=[{f0:0,f1:0.5,k:'p'},{f0:0.5,f1:1,k:'p'}];
    else if(style==='tout_vitre') rows=[{f0:0,f1:1,k:'g'}];
    else if(style==='mi_vitre')   rows=[{f0:0,f1:0.5,k:'p'},{f0:0.5,f1:1,k:'g'}];
    else                          rows=[{f0:0,f1:0.58,k:'p'},{f0:0.58,f1:1,k:'g'}];
    var mr=0.05;
    rows.forEach(function(r){
      var ry0=iy0+r.f0*ih+(r.f0>0?mr/2:0), ry1=iy0+r.f1*ih-(r.f1<1?mr/2:0);
      if(ry1<=ry0) return;
      if(r.k==='p'){
        leafBox(T, icx,(ry0+ry1)/2,zc, iw,(ry1-ry0), lt*0.6, colP,1);
      } else {
        _CURTEX=null;
        leafBox(T, icx,(ry0+ry1)/2,zc, iw,(ry1-ry0), lt*0.22, colG,0.3);  /* verre (jamais texture) */
        _CURTEX=FINISH_TEX.panneau;
        var bw=0.024;
        for(var v=1;v<=PPORTE.mv;v++){ var xb=ix0+iw*v/(PPORTE.mv+1); leafBox(T, xb,(ry0+ry1)/2,zc, bw,(ry1-ry0),lt*0.7, colL,1); }
        for(var k=1;k<=PPORTE.mh;k++){ var yb=ry0+(ry1-ry0)*k/(PPORTE.mh+1); leafBox(T, icx,yb,zc, iw,bw,lt*0.7, colL,1); }
      }
    });
    for(var ri=1;ri<rows.length;ri++){ var my=iy0+rows[ri].f0*ih; leafBox(T, icx,my,zc, iw,mr,lt, colL,1); }
  }
  _CURTEX=null;
  if(handle) buildHandle(T, x0,x1, handleEdge, handleY, zc, lt, colH, PPORTE.handleType);
}
/* Poignées : plusieurs types (béquille, bouton, barre de tirage, cuvette). */
function buildHandle(T, x0,x1, handleEdge, handleY, zc, lt, colH, type){
  var roseX=handleEdge>0? x1-0.05 : x0+0.05, dir=handleEdge>0?-1:1;
  _CURTEX=FINISH_TEX.poignee;                              /* matiere "Poignée" */
  if(type==='bouton'){
    leafBox(T, roseX,handleY,zc+lt/2+0.005, 0.06,0.06,0.012, colH,1);
    leafBox(T, roseX,handleY,zc-lt/2-0.005, 0.06,0.06,0.012, colH,1);
    leafBox(T, roseX,handleY,zc+lt/2+0.035, 0.05,0.05,0.06, colH,1);
    leafBox(T, roseX,handleY,zc-lt/2-0.035, 0.05,0.05,0.06, colH,1);
  } else if(type==='barre'){
    [1,-1].forEach(function(sgn){
      var zf=zc+sgn*(lt/2+0.05);
      leafBox(T, roseX, handleY, zf, 0.03,0.46,0.03, colH,1);
      leafBox(T, roseX, handleY+0.19, zc+sgn*(lt/2+0.026), 0.026,0.026,0.052, colH,1);
      leafBox(T, roseX, handleY-0.19, zc+sgn*(lt/2+0.026), 0.026,0.026,0.052, colH,1);
    });
  } else if(type==='cuvette'){
    leafBox(T, roseX,handleY,zc+lt/2-0.004, 0.04,0.14,0.012, colH,1);
    leafBox(T, roseX,handleY,zc-lt/2+0.004, 0.04,0.14,0.012, colH,1);
  } else {
    leafBox(T, roseX, handleY, zc+lt/2+0.006, 0.045,0.11,0.012, colH,1);
    leafBox(T, roseX, handleY, zc-lt/2-0.006, 0.045,0.11,0.012, colH,1);
    leafBox(T, roseX+dir*0.055, handleY, zc+lt/2+0.022, 0.11,0.02,0.02, colH,1);
    leafBox(T, roseX+dir*0.055, handleY, zc-lt/2-0.022, 0.11,0.02,0.02, colH,1);
  }
  _CURTEX=null;
}
function genericPostBuild(){
  /* Aiguillage moteur pour TOUS les objets paramétriques.
     WebGL pour les modes pleins ; repli logiciel pour filaire / lignes cachées
     (et si WebGL indisponible). */
  var useGL = (ENGINE==='webgl' && RENDER!=='wire' && RENDER!=='hidden');
  if(useGL){
    if(WGL.gActive){ WGL.uploadFC(FC); WGL.render(); }
    else { WGL.showGeneric(DIMS); }
  } else if(WGL.gActive){
    WGL.hideGeneric(); DIRTY=true;
  } else { DIRTY=true; }
}
function buildPorte(){
  var W=PPORTE.w/100, H=PPORTE.h/100, lt=PPORTE.lt/100;
  var fw=PPORTE.fw/100, fd=PPORTE.fd/100, hasFrame=PPORTE.frame;
  var impH=PPORTE.imposteOn?PPORTE.imposte/100:0;
  var type=PPORTE.type, panel=PPORTE.panel;

  face([V(-1,-1,-1,'z'),V(-1,1,-1,'z'),V(1,1,-1,'z'),V(1,-1,-1,'z')],[0,0,-1],col,1);
  [[-1,-1],[1,-1],[1,1],[-1,1]].forEach(function(e){ var sx=e[0],sy=e[1];
    face([V(sx,sy,-1,'x'),V(sx,sy,-1,'y'),V(sx,sy,1,'y'),V(sx,sy,1,'x')],nrm([sx,sy,0]),col,1); });
  [[-1,-1],[1,-1],[1,1],[-1,1]].forEach(function(e){ var sx=e[0],sz=e[1];
    face([V(sx,-1,sz,'x'),V(sx,-1,sz,'z'),V(sx,1,sz,'z'),V(sx,1,sz,'x')],nrm([sx,0,sz]),col,1); });
  [[-1,-1],[1,-1],[1,1],[-1,1]].forEach(function(e){ var sy=e[0],sz=e[1];
    face([V(-1,sy,sz,'y'),V(-1,sy,sz,'z'),V(1,sy,sz,'z'),V(1,sy,sz,'y')],nrm([0,sy,sz]),col,1); });
  [-1,1].forEach(function(sx){[-1,1].forEach(function(sy){[-1,1].forEach(function(sz){
    face([V(sx,sy,sz,'x'),V(sx,sy,sz,'y'),V(sx,sy,sz,'z')],nrm([sx,sy,sz]),col,1);

}
/* disque/galette à bords arrondis (assise ronde) */
function roundDisc(cx,cz,r,y0,y1,col,seg,rr){
  seg=seg||22; rr=Math.max(0.002,Math.min(rr,(y1-y0)/2-0.002,r-0.002));
  var yb=y0+rr, yt=y1-rr;
  function ring(rad,y){var a=[];for(var i=0;i<seg;i++){var t=2*Math.PI*i/seg;a.push([cx+rad*Math.cos(t),y,cz+rad*Math.sin(t)]);}return a;}
  var R1=ring(r,yb),R2=ring(r,yt),Rt=ring(r-rr,y1),Rb=ring(r-rr,y0);
  for(var i=0;i<seg;i++){var j=(i+1)%seg,am=2*Math.PI*(i+0.5)/seg,nx=Math.cos(am),nz=Math.sin(am);
    face([R1[i],R1[j],R2[j],R2[i]],[nx,0,nz],col,1);
    face([R2[i],R2[j],Rt[j],Rt[i]],[nx*0.7,0.7,nz*0.7],col,1);
    face([Rb[i],Rb[j],R1[j],R1[i]],[nx*0.7,-0.7,nz*0.7],col,1);
  }
  var top=[],bot=[]; for(var i=0;i<seg;i++){top.push(Rt[i]); bot.unshift(Rb[i]);}
  face(top,[0,1,0],col,1); face(bot,[0,-1,0],col,1);
}
function buildArmoire(p){

function buildTable(p){

function build(){
  FC=[]; PRIMS=[];
  /* texture courante par défaut = celle de l'élément "forme" (objets simples).
     buildMeuble la repositionne par élément (corps/étagère). */
  _CURTEX = FINISH_TEX.forme;
  var r;
  if(MODE==='forme'){ r=(SHAPE_BLD[SHAPE]||buildCube)(); }
  else if(MODE==='mur'){ r=buildMur(); }
  else if(MODE==='dalle'){ r=buildDalle(); }
  else if(MODE==='poteau'){ r=buildPoteau(); }
  else if(MODE==='poutre'){ r=buildPoutre(); }
  else if(MODE==='gardecorps'){ r=buildGardeCorps(); }
  else if(MODE==='porte'){ r=buildPorte(); }
  else if(MODE==='fenetre'){ r=buildFenetre(); }
  else if(MODE==='murrideau'){ r=buildMurRideau(); }
  else if(MODE==='furn'){ r=buildFurniture(); }
  else if(MODE==='quadripod'){
    r = (AL_PRODUCT==='woo') ? buildWoo()
      : (AL_PRODUCT==='bureau') ? buildBureau()
      : buildQuadripod();
  }
  else { r=buildMeuble(); }
  _CURTEX = null;   /* reset après construction */
  applyObjectFinish();   /* matiere personnalisee globale (objets non-meuble) */
  CAM.ty = r.h/2;   /* recentre la visée sur le milieu de l'objet */
  buildEdges();     /* prépare les arêtes (pour le mode lignes cachées) */
  if(MODE!=='quadripod') genericPostBuild();   /* aiguillage moteur (tous objets) */
