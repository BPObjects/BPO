}

/* fitCamera() : place automatiquement la caméra pour que l'objet remplisse le
   cadre. Calcule le rayon englobant (demi-diagonale hors-tout) et en déduit la
   distance r telle que l'objet occupe ~80% de la hauteur visible. Appelé au
   changement d'objet (pas à chaque rebuild, pour ne pas annuler le zoom manuel). */
function fitCamera(dims){
  var w=dims.w, h=dims.h, d=dims.d;
  /* rayon de la sphère englobant l'objet (demi-diagonale) */
  var R=0.5*Math.sqrt(w*w + h*h + d*d);
  /* focale utilisée par proj() : f=2.14 -> tan(demi-angle vertical)=1/f.
     distance pour que le rayon R tienne dans le cadre, avec une marge (0.78). */
  var f=2.14;
  var dist=R*f/0.78;
  /* bornes raisonnables (cohérentes avec le zoom molette/pinch) */
  CAM.r = Math.max(0.6, Math.min(14, dist));
  CAM.ty = h/2;     /* vise le centre en hauteur */
}

/* buildEdges() : construit EDGES[], la liste des arêtes uniques du modèle.
   Chaque arête mémorise ses 2 extrémités (3D) et les normales des 1 ou 2 faces
   qui la partagent. Sert au mode "lignes cachées" pour ne tracer que les
   arêtes de silhouette (bord du volume) et de pli franc (angle vif), pas tout
   le maillage — ce qui donne le rendu épuré type croquis.
   Clé d'arête = positions arrondies des 2 sommets (ordre indifférent). */
var EDGES=[];
function buildEdges(){
  var map={};
  function key(a,b){
    var ka=a[0].toFixed(3)+'_'+a[1].toFixed(3)+'_'+a[2].toFixed(3);
    var kb=b[0].toFixed(3)+'_'+b[1].toFixed(3)+'_'+b[2].toFixed(3);
    return ka<kb ? ka+'|'+kb : kb+'|'+ka;
  }
  for(var i=0;i<FC.length;i++){
    var f=FC[i], vs=f.verts, n=vs.length;
    if(f.al<1) continue;                 /* on ignore le verre */
    for(var e=0;e<n;e++){
      var a=vs[e], b=vs[(e+1)%n], k=key(a,b);
      if(!map[k]) map[k]={a:a, b:b, faces:[]};
      map[k].faces.push(f.n);
    }
  }
  EDGES=[];
  for(var k in map) EDGES.push(map[k]);
}

/* ============================================================================
   5. RENDU
   Dessine le meuble sur le canvas à chaque frame :
   - efface le fond
   - dessine un sol quadrillé
   - projette toutes les faces, les trie par profondeur (peintre), les remplit
   - affiche les cotes (largeur/hauteur)
   ============================================================================ */
var cv  = document.getElementById('cv');
var vp  = document.getElementById('vp');
var ctx = cv.getContext('2d');

/* scale() : applique un facteur de luminosité (b) à une composante couleur (ch). */
function scale(ch, b){ var v=Math.round(ch*b); return v<0?0:(v>255?255:v); }

/* ============================================================================
   ÉCLAIRAGE RÉALISTE (mode 'real')
   Combine plusieurs effets pour un rendu "matériau brillant" sans WebGL :
   - diffus (Lambert)         : éclairage de base selon l'angle face/lumière
   - ambiance ciel/sol        : les faces tournées vers le haut prennent une
                                teinte de ciel (bleuté), vers le bas une teinte
                                de sol (chaude) -> ancrage dans l'environnement
   - spéculaire (Blinn-Phong) : point chaud lumineux selon l'angle œil/lumière
   - Fresnel                  : les faces rasantes (bord de l'objet) s'éclairent
                                -> effet verre/métal sur les contours
   ============================================================================ */
var SKY_COL  = [120, 150, 200];   /* lumière du ciel (haut)  */
var GND_COL  = [90,  80,  65];    /* lumière du sol (bas)    */

/* shadeReal() : renvoie la couleur finale [r,g,b] d'un point de normale n,
   de couleur de base col, vu par la caméra cam.
   NOTE : le pic spéculaire intense est dessiné séparément (halo flou, voir
   drawSpecularHighlights) pour éviter le hachuré des facettes. Ici on ne garde
   qu'un spéculaire LARGE et doux qui s'interpole bien. */
function shadeReal(n, col, cam){
  /* vecteur vue (du point vers la caméra) ~ -cam.fwd */
  var V = [-cam.fwd[0], -cam.fwd[1], -cam.fwd[2]];
  /* diffus */
  var diff = Math.max(0, dot(n, LIGHT));
  /* ambiance ciel/sol selon l'inclinaison verticale de la normale */
  var up = n[1];                       /* -1 (bas) .. +1 (haut) */
  var skyMix = (up+1)/2;               /* 0 en bas, 1 en haut   */
  /* spéculaire DOUX (exposant faible) : halo large, varie lentement -> lisse */
  var H = norm([LIGHT[0]+V[0], LIGHT[1]+V[1], LIGHT[2]+V[2]]);
  var specSoft = Math.pow(Math.max(0, dot(n, H)), 4) * (0.12 + SHINE*0.22);
  /* Fresnel : fort quand la normale est perpendiculaire à la vue (bord) */
  var fres = Math.pow(1 - Math.max(0, dot(n, V)), 3) * (0.15 + SHINE*0.5);

  /* composition : base diffuse + ambiant teinté ciel/sol */
  var amb = 0.32;                      /* niveau ambiant minimal */
  var kd = amb + 0.72*diff;            /* coefficient diffus     */
  var r = col[0]*kd, g = col[1]*kd, b = col[2]*kd;
  /* ajout teinte ambiante ciel (haut) / sol (bas), légère */
  var aMix = 0.16;
  r += (SKY_COL[0]*skyMix + GND_COL[0]*(1-skyMix)) * aMix;
  g += (SKY_COL[1]*skyMix + GND_COL[1]*(1-skyMix)) * aMix;
  b += (SKY_COL[2]*skyMix + GND_COL[2]*(1-skyMix)) * aMix;
  /* spéculaire doux (blanc) + Fresnel (blanc bleuté) */
  var sAdd = specSoft*255, fAdd = fres*255;
  r += sAdd + fAdd*0.7;
  g += sAdd + fAdd*0.8;
  b += sAdd + fAdd*1.0;
  return [ r>255?255:(r<0?0:r), g>255?255:(g<0?0:g), b>255?255:(b<0?0:b) ];
}

/* drawSpecularHighlights() : dépose les pics spéculaires comme des halos
   lumineux radiaux flous, PAR-DESSUS le tore déjà rendu. Comme un halo radial
   est continu par construction, le reflet n'a aucune facette — il glisse en
   douceur. On échantillonne les sommets : ceux où le spéculaire (Blinn-Phong
   dur) est fort déposent un halo blanc additif à leur position écran. */
function drawSpecularHighlights(draw, cam, W, H){
  if(SHINE < 0.02) return;
  var V = [-cam.fwd[0], -cam.fwd[1], -cam.fwd[2]];
  var Hh = norm([LIGHT[0]+V[0], LIGHT[1]+V[1], LIGHT[2]+V[2]]);
  var expo = 30 + SHINE*80;            /* pic plus serré = reflet localisé */
  ctx.save();
  ctx.globalCompositeOperation='lighter';   /* additif : les halos s'ajoutent */
  for(var i=0;i<draw.length;i++){
    var it=draw[i];
    if(it.al<1 || !it.front || !it.vcol) continue;  /* surfaces opaques courbes */
    var pts=it.pts, vn=it.vnRef;
    if(!vn) continue;
    /* taille écran de la facette pour dimensionner les halos */
    var fcx=0, fcy=0, L=pts.length;
    for(var k=0;k<L;k++){ fcx+=pts[k].x; fcy+=pts[k].y; }
    fcx/=L; fcy/=L;
    var fr=0;
    for(var k=0;k<L;k++){ var ex=pts[k].x-fcx, ey=pts[k].y-fcy, dd=ex*ex+ey*ey; if(dd>fr) fr=dd; }
    fr=Math.sqrt(fr);
    var rad=Math.max(6, fr*1.6);        /* halos plus petits */
    for(var v=0; v<vn.length; v++){
      var d=Math.max(0, dot(vn[v], Hh));
      var sp=Math.pow(d, expo);
      if(sp < 0.12) continue;                       /* seuil plus haut : moins de halos */
      /* intensité globale BEAUCOUP plus douce */
      var inten=sp*(0.18+SHINE*0.30);
      var p=pts[v];
      var g=ctx.createRadialGradient(p.x,p.y,0, p.x,p.y,rad);
      var a=Math.min(0.42, inten);      /* opacité plafonnée bas */
      g.addColorStop(0,   'rgba(255,253,247,'+a.toFixed(3)+')');
      g.addColorStop(0.45,'rgba(255,255,255,'+(a*0.30).toFixed(3)+')');
      g.addColorStop(1,   'rgba(245,248,255,0)');
      ctx.fillStyle=g;
      ctx.beginPath(); ctx.arc(p.x,p.y,rad,0,Math.PI*2); ctx.fill();
    }
  }
  ctx.restore();
}

/* drawGroundShadow() : ombre floue elliptique sous l'objet (ancrage visuel). */
function drawGroundShadow(cam, W, H){
  var d=DIMS, rx=d.w*0.6, rz=d.d*0.6;
  /* 4 points au sol autour de l'objet -> ellipse approximée */
  var cen=proj(cam,[0,0.001,0],W,H);
  var ex=proj(cam,[rx,0.001,0],W,H);
  var ez=proj(cam,[0,0.001,rz],W,H);
  if(!cen||!ex||!ez) return;
  var ax=Math.abs(ex.x-cen.x)+Math.abs(ez.x-cen.x);
  var ay=Math.abs(ex.y-cen.y)+Math.abs(ez.y-cen.y)+2;
  ctx.save();
  ctx.translate(cen.x, cen.y);
  ctx.scale(1, Math.max(0.18, ay/Math.max(ax,1)));
  var rg=ctx.createRadialGradient(0,0,1, 0,0,Math.max(ax,ay,8));
  rg.addColorStop(0,'rgba(0,0,0,0.42)');
  rg.addColorStop(0.6,'rgba(0,0,0,0.20)');
  rg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=rg;
  ctx.beginPath(); ctx.arc(0,0,Math.max(ax,8),0,Math.PI*2); ctx.fill();
  ctx.restore();
}

/* ============================================================================
   RASTERISEUR Z-BUFFER (rendu pixel-parfait)
   ----------------------------------------------------------------------------
   Élimine définitivement les chevauchements de faces : on peint chaque triangle
   pixel par pixel dans un tampon, en ne gardant que le pixel le plus proche
   (test de profondeur). L'ordre de dessin n'a plus aucune importance.
   Cette version est PROPRE : test barycentrique strict (pas de débordement),
   tampon RGBA dédié, blit unique à la fin. Pas de bavure.
   ============================================================================ */
var ZIMG=null, ZBUF=null, ZW=0, ZH=0;

/* ----------------------------------------------------------------------------
   TRIANGULATION PAR EAR-CLIPPING (gère les polygones CONCAVES)
   La triangulation en éventail (fan) ne marche que sur les polygones convexes.
   Les objets importés (OBJ fabricant) ont des faces concaves (contours courbes,
   ouvertures) qui produisent des triangles débordants ("bulles" parasites).
   Ear-clipping découpe correctement n'importe quel polygone simple.
   Renvoie une liste d'indices de triangles [i0,i1,i2, ...] référant pts3d.
   ---------------------------------------------------------------------------- */
function triangulateFace(pts3d, nrm){
  var n=pts3d.length;
  if(n<3) return [];
  if(n===3) return [0,1,2];
  if(n===4) return [0,1,2, 0,2,3];   /* quad : 2 triangles */
  /* projeter sur le plan dominant (selon la normale) pour travailler en 2D */
  var ax=Math.abs(nrm[0]), ay=Math.abs(nrm[1]), az=Math.abs(nrm[2]);
  var u,v;
  if(ax>=ay && ax>=az){ u=2; v=1; }
  else if(ay>=ax && ay>=az){ u=0; v=2; }
  else { u=0; v=1; }
  var P=[];
  for(var i=0;i<n;i++) P.push([pts3d[i][u], pts3d[i][v]]);
  var area=0;
  for(var i=0;i<n;i++){ var j=(i+1)%n; area+=P[i][0]*P[j][1]-P[j][0]*P[i][1]; }
  var ccw = area>0;
  var idx=[];
  for(var i=0;i<n;i++) idx.push(i);
  var tris=[];
  function cross(o,a,b){ return (a[0]-o[0])*(b[1]-o[1])-(a[1]-o[1])*(b[0]-o[0]); }
  function inTri(p,a,b,c){
    var d1=cross(p,a,b), d2=cross(p,b,c), d3=cross(p,c,a);
    var neg=(d1<0)||(d2<0)||(d3<0), pos=(d1>0)||(d2>0)||(d3>0);
    return !(neg&&pos);
  }
  var guard=0;
  while(idx.length>3 && guard++<n*n){
    var found=false;
    for(var k=0;k<idx.length;k++){
      var i0=idx[(k-1+idx.length)%idx.length], i1=idx[k], i2=idx[(k+1)%idx.length];
      var a=P[i0], b=P[i1], c=P[i2];
      var conv=cross(a,b,c);
      if((ccw && conv<=0) || (!ccw && conv>=0)) continue;   /* sommet réflexe */
      var ok=true;
      for(var m=0;m<idx.length;m++){
        var im=idx[m];
        if(im===i0||im===i1||im===i2) continue;
        if(inTri(P[im],a,b,c)){ ok=false; break; }
      }
      if(!ok) continue;
      tris.push(i0,i1,i2);
      idx.splice(k,1);
      found=true; break;
    }
    if(!found) break;
  }
  if(idx.length===3) tris.push(idx[0],idx[1],idx[2]);
  return tris;
}

function zReset(W, H){
  if(!ZIMG || ZW!==W || ZH!==H){
    ZIMG=ctx.createImageData(W,H);
    ZBUF=new Float32Array(W*H);
    ZW=W; ZH=H;
  }
  var d=ZIMG.data, n=W*H;
  for(var i=0;i<n;i++){ d[i*4+3]=0; ZBUF[i]=Infinity; }   /* transparent + loin */
}

/* zTri() : rasterise un triangle avec couleurs par sommet (c0,c1,c2) et test de
   profondeur. Test barycentrique STRICT (>= 0) : aucun débordement, donc aucune
   bavure. Les pixels exactement sur l'arête partagée sont couverts par l'un des
   deux triangles voisins (jamais de trou car ils partagent les mêmes sommets). */
function zTri(p0,p1,p2, c0,c1,c2){
  var W=ZW, H=ZH, data=ZIMG.data;
  var minX=Math.max(0, Math.floor(Math.min(p0.x,p1.x,p2.x)));
  var maxX=Math.min(W-1, Math.ceil(Math.max(p0.x,p1.x,p2.x)));
  var minY=Math.max(0, Math.floor(Math.min(p0.y,p1.y,p2.y)));
  var maxY=Math.min(H-1, Math.ceil(Math.max(p0.y,p1.y,p2.y)));
  if(minX>maxX || minY>maxY) return;
  var area=(p1.x-p0.x)*(p2.y-p0.y)-(p2.x-p0.x)*(p1.y-p0.y);
  if(Math.abs(area)<1e-7) return;
  var inv=1/area;
  /* Profondeur perspective-correcte : on interpole 1/z (linéaire à l'écran),
     pas z directement. Interpoler z linéairement est FAUX en perspective et
     provoque du z-fighting sur les faces inclinées vues en plongée (l'étagère
     qui perce les portes). On pré-calcule 1/z aux 3 sommets. */
  var iz0=1/p0.z, iz1=1/p1.z, iz2=1/p2.z;
  for(var y=minY;y<=maxY;y++){
    for(var x=minX;x<=maxX;x++){
      var px=x+0.5, py=y+0.5;
      var w0=((p1.x-px)*(p2.y-py)-(p2.x-px)*(p1.y-py))*inv;
      var w1=((p2.x-px)*(p0.y-py)-(p0.x-px)*(p2.y-py))*inv;
      var w2=1-w0-w1;
      if(w0<0 || w1<0 || w2<0) continue;          /* strict : dans le triangle */
      /* 1/z interpolé linéairement -> z réel = 1/(interpolation) */
      var iz=w0*iz0+w1*iz1+w2*iz2;
      var z=1/iz;
      var idx=y*W+x;
      if(z>=ZBUF[idx]) continue;
      ZBUF[idx]=z;
      var o=idx*4;
      data[o]  =w0*c0[0]+w1*c1[0]+w2*c2[0];
      data[o+1]=w0*c0[1]+w1*c1[1]+w2*c2[1];
      data[o+2]=w0*c0[2]+w1*c1[2]+w2*c2[2];
      data[o+3]=255;
    }
  }
}

/* zTriTex() : rasterise un triangle TEXTURÉ. Comme zTri mais échantillonne une
   image au lieu d'une couleur unie. UV perspective-correctes (on interpole u/z
   et v/z, puis on divise par 1/z). `tex` = {data,w,h}. uv0/1/2 = coords [u,v] des
   sommets (répétition gérée par modulo). `br0/1/2` = luminosité par sommet
   (ombrage appliqué sur la couleur échantillonnée). */
function zTriTex(p0,p1,p2, uv0,uv1,uv2, tex, br0,br1,br2){
  var W=ZW, H=ZH, data=ZIMG.data, td=tex.data, tw=tex.w, th=tex.h;
  var minX=Math.max(0, Math.floor(Math.min(p0.x,p1.x,p2.x)));
  var maxX=Math.min(W-1, Math.ceil(Math.max(p0.x,p1.x,p2.x)));
  var minY=Math.max(0, Math.floor(Math.min(p0.y,p1.y,p2.y)));
  var maxY=Math.min(H-1, Math.ceil(Math.max(p0.y,p1.y,p2.y)));
  if(minX>maxX || minY>maxY) return;
  var area=(p1.x-p0.x)*(p2.y-p0.y)-(p2.x-p0.x)*(p1.y-p0.y);
  if(Math.abs(area)<1e-7) return;
  var inv=1/area;
  var iz0=1/p0.z, iz1=1/p1.z, iz2=1/p2.z;
  /* u/z et v/z aux sommets (pour interpolation perspective-correcte) */
  var u0=uv0[0]*iz0, v0=uv0[1]*iz0;
  var u1=uv1[0]*iz1, v1=uv1[1]*iz1;
  var u2=uv2[0]*iz2, v2=uv2[1]*iz2;
  for(var y=minY;y<=maxY;y++){
    for(var x=minX;x<=maxX;x++){
      var px=x+0.5, py=y+0.5;
      var w0=((p1.x-px)*(p2.y-py)-(p2.x-px)*(p1.y-py))*inv;
      var w1=((p2.x-px)*(p0.y-py)-(p0.x-px)*(p2.y-py))*inv;
      var w2=1-w0-w1;
      if(w0<0 || w1<0 || w2<0) continue;
      var iz=w0*iz0+w1*iz1+w2*iz2;
      var z=1/iz;
      var idx=y*W+x;
      if(z>=ZBUF[idx]) continue;
      ZBUF[idx]=z;
      /* u,v perspective-correctes */
      var u=(w0*u0+w1*u1+w2*u2)/iz;
      var v=(w0*v0+w1*v1+w2*v2)/iz;
      /* répétition (tiling) : modulo sur la taille de la texture */
      var tx=((u%1)+1)%1, ty=((v%1)+1)%1;
      var sx=(tx*tw)|0, sy=(ty*th)|0;
      var to=(sy*tw+sx)*4;
      var br=w0*br0+w1*br1+w2*br2;
      var o=idx*4;
      data[o]  =td[to]*br;
      data[o+1]=td[to+1]*br;
      data[o+2]=td[to+2]*br;
      data[o+3]=255;
    }
  }
}

/* zTriGlass() : rasterise un triangle de VERRE transparent. Comme zTri,
   perspective-correcte et test de profondeur. Différences :
   - si le pixel est derrière un opaque (z-test échoue) -> verre masqué (correct)
   - sinon on COMPOSE la couleur du verre (alpha) sur le pixel existant
   - on N'ÉCRIT PAS dans ZBUF : le verre ne bloque pas ce qui pourrait être devant
     (autre vitre), et reste « derrière » pour les opaques dessinés plus tard.
   Couleur unie (col) car le verre est lisse et translucide. */
function zTriGlass(p0,p1,p2, col, al){
  var W=ZW, H=ZH, data=ZIMG.data;
  var minX=Math.max(0, Math.floor(Math.min(p0.x,p1.x,p2.x)));
  var maxX=Math.min(W-1, Math.ceil(Math.max(p0.x,p1.x,p2.x)));
  var minY=Math.max(0, Math.floor(Math.min(p0.y,p1.y,p2.y)));
  var maxY=Math.min(H-1, Math.ceil(Math.max(p0.y,p1.y,p2.y)));
  if(minX>maxX || minY>maxY) return;
  var area=(p1.x-p0.x)*(p2.y-p0.y)-(p2.x-p0.x)*(p1.y-p0.y);
  if(Math.abs(area)<1e-7) return;
  var inv=1/area;
  var iz0=1/p0.z, iz1=1/p1.z, iz2=1/p2.z;
  var cr=col[0], cg=col[1], cb=col[2];
  for(var y=minY;y<=maxY;y++){
    for(var x=minX;x<=maxX;x++){
      var px=x+0.5, py=y+0.5;
      var w0=((p1.x-px)*(p2.y-py)-(p2.x-px)*(p1.y-py))*inv;
      var w1=((p2.x-px)*(p0.y-py)-(p0.x-px)*(p2.y-py))*inv;
      var w2=1-w0-w1;
      if(w0<0 || w1<0 || w2<0) continue;
      var z=1/(w0*iz0+w1*iz1+w2*iz2);
      var idx=y*W+x;
      if(z>=ZBUF[idx]) continue;            /* derrière un opaque : verre masqué */
      var o=idx*4, ba=data[o+3];
      /* le verre ne se compose QUE s'il y a un opaque derrière lui (ba>0).
         Sur le vide (pas d'opaque), on ne dessine rien : ainsi, vu de l'arrière,
         le verre de façade (qui n'a pas le caisson derrière lui mais devant) ne
         s'affiche pas, et il n'y a pas de débordement parasite hors du meuble. */
      if(ba>0){
        data[o]  = cr*al + data[o]*(1-al);
        data[o+1]= cg*al + data[o+1]*(1-al);
        data[o+2]= cb*al + data[o+2]*(1-al);
        data[o+3]= 255;
      }
    }
  }
}

/* zBlit() : compose le tampon (transparent hors objet) sur le canvas, en
   préservant le sol déjà dessiné. Via canvas hors-écran + drawImage. */
var _zcv=null, _zctx=null;
function zBlit(W, H){
  if(!_zcv){ _zcv=document.createElement('canvas'); _zctx=_zcv.getContext('2d'); }
  if(_zcv.width!==W || _zcv.height!==H){ _zcv.width=W; _zcv.height=H; }
  _zctx.putImageData(ZIMG, 0, 0);
  ctx.drawImage(_zcv, 0, 0);
}

var DIRTY=true, _bgGrad=null, _bgH=-1;
function requestRender(){ DIRTY=true; }
function frame(){
  requestAnimationFrame(frame);                  /* boucle d'animation continue */
  var W=vp.clientWidth, H=vp.clientHeight;
  if(!W || !H) return;                            /* viewport pas encore prêt    */
  if(cv.width!==W || cv.height!==H){ cv.width=W; cv.height=H; DIRTY=true; }
  if(!DIRTY) return;
  DIRTY=false;

  /* Fond : dégradé ambiance en mode réaliste, uni sinon */
  if(RENDER==='real'){
    if(_bgGrad===null || _bgH!==H){
      _bgGrad=ctx.createLinearGradient(0,0,0,H);
      _bgGrad.addColorStop(0,'#2b3344');
      _bgGrad.addColorStop(0.55,'#222732');
      _bgGrad.addColorStop(1,'#15181f');
      _bgH=H;
    }
    ctx.fillStyle=_bgGrad; ctx.fillRect(0,0,W,H);
  } else {
    ctx.fillStyle='#1a1d23'; ctx.fillRect(0,0,W,H);
  }
  var cam = getCam();

  /* Ombre au sol (mode réaliste, avant le quadrillage et l'objet) */
  if(RENDER==='real'){ drawGroundShadow(cam, W, H); }

  /* Sol quadrillé (repère visuel) — discret en mode réaliste */
  ctx.strokeStyle = (RENDER==='real') ? 'rgba(52,58,70,0.25)' : 'rgba(52,58,70,0.7)';
  ctx.lineWidth=0.5;
  for(var i=-7;i<=7;i++){
    var a=proj(cam,[i,0,-7],W,H), b=proj(cam,[i,0,7],W,H);
    if(a&&b){ ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }
    var c=proj(cam,[-7,0,i],W,H), e=proj(cam,[7,0,i],W,H);
    if(c&&e){ ctx.beginPath(); ctx.moveTo(c.x,c.y); ctx.lineTo(e.x,e.y); ctx.stroke(); }
  }

  /* ── Direction de la lumière projetée à l'écran (pour orienter les dégradés) ── */
  var sLX=dot(cam.right,LIGHT), sLY=-dot(cam.up,LIGHT);
  var sLN=Math.sqrt(sLX*sLX+sLY*sLY);
  if(sLN>0.001){ sLX/=sLN; sLY/=sLN; } else { sLX=0.6; sLY=-0.8; }

  /* ── CAS SPÉCIAL : SPHÈRE PARFAITE (mode lissé uniquement) ──
     Une sphère se projette toujours en disque. On la dessine comme un cercle
     rempli d'un dégradé radial : lisse à l'infini, aucune facette.
     Dans les autres modes (plat/lignes cachées/filaire) on veut voir le
     maillage, donc on laisse la sphère passer par le rendu normal. */
  if(MODE==='forme' && SHAPE==='sphere' && (RENDER==='smooth' || RENDER==='real')){
    var sr=Math.min(PF.w,PF.h,PF.d)/200;          /* rayon en m */
    var ctr=proj(cam,[0,sr,0],W,H);
    var edg=proj(cam,[sr,sr,0],W,H);
    if(ctr&&edg){
      var pr=Math.abs(edg.x-ctr.x); if(pr<2) pr=2; /* rayon écran */
      var c=colForme();
      /* point lumineux décalé vers la source de lumière */
      var hlx=ctr.x+sLX*pr*0.42, hly=ctr.y+sLY*pr*0.42;
      var rg=ctx.createRadialGradient(hlx,hly,pr*0.05, ctr.x,ctr.y,pr*1.02);
      rg.addColorStop(0,   'rgb('+scale(c[0],1.25)+','+scale(c[1],1.25)+','+scale(c[2],1.25)+')');
      rg.addColorStop(0.45,'rgb('+scale(c[0],0.95)+','+scale(c[1],0.95)+','+scale(c[2],0.95)+')');
      rg.addColorStop(0.82,'rgb('+scale(c[0],0.60)+','+scale(c[1],0.60)+','+scale(c[2],0.60)+')');
      rg.addColorStop(1,   'rgb('+scale(c[0],0.40)+','+scale(c[1],0.40)+','+scale(c[2],0.40)+')');
      ctx.fillStyle=rg;
      ctx.beginPath(); ctx.arc(ctr.x,ctr.y,pr,0,Math.PI*2); ctx.fill();
    }
    drawCotes(cam,W,H);                            /* cotes puis on sort */
    return;
  }

  /* Projette chaque face. Si normales par sommet (vn) -> luminosité par sommet
     pour un ombrage lissé (Gouraud). Sinon luminosité plate par face.
     On calcule aussi la visibilité de la face (tournée vers la caméra ou non)
     via l'aire signée à l'écran, utile pour les modes lignes cachées / filaire. */
  var draw=[];
  for(var i=0;i<FC.length;i++){
    var f=FC[i], pts=[], ok=true;
    for(var v=0; v<f.verts.length; v++){
      var pp=proj(cam, f.verts[v], W, H);
      if(!pp){ ok=false; break; }
      pts.push(pp);
    }
    if(!ok || pts.length<3) continue;
    /* profondeur projetée moyenne + min (pour départage) */
    var az=0, zmin=Infinity;
    for(var j=0;j<pts.length;j++){ az+=pts[j].z; if(pts[j].z<zmin) zmin=pts[j].z; }
    az/=pts.length;
    /* distance euclidienne 3D du centre de la face à la caméra : critère de tri
       le plus stable (ne bascule pas entre les 2 grandes faces d'un panneau fin
       car leurs centres 3D sont bien distincts en profondeur réelle) */
    var cx=0, cy=0, cz=0, nv=f.verts.length;
    for(var j=0;j<nv;j++){ cx+=f.verts[j][0]; cy+=f.verts[j][1]; cz+=f.verts[j][2]; }
    cx/=nv; cy/=nv; cz/=nv;
    var ddx=cx-cam.ex, ddy=cy-cam.ey, ddz=cz-cam.ez;
    var dist=ddx*ddx+ddy*ddy+ddz*ddz;   /* distance² (suffit pour comparer) */
    /* Face tournée vers la caméra : sa normale pointe vers l'observateur,
       donc dot(normale, direction_regard) < 0. UNE SEULE convention partout
       (remplissage + occlusion) pour éviter les incohérences. */
    var front = dot(f.n, cam.fwd) < 0;
    /* luminosité de face (fallback) */
    var br=0.45 + 0.55*Math.max(0, dot(f.n, LIGHT));
    /* luminosité par sommet si normales fournies */
    var vbr=null;
    if(f.vn){
      vbr=[];
      for(var v=0; v<f.vn.length; v++){
        vbr.push(0.45 + 0.55*Math.max(0, dot(f.vn[v], LIGHT)));
      }
    }
    /* MODE RÉALISTE : couleurs éclairées (spéculaire + ambiance + Fresnel) */
    var fcol=null, vcol=null;
    if(RENDER==='real'){
      fcol = shadeReal(f.n, f.col, cam);
      if(f.vn){
        vcol=[];
        for(var v=0; v<f.vn.length; v++) vcol.push(shadeReal(f.vn[v], f.col, cam));
      }
    }
    draw.push({pts:pts, z:az, zmin:zmin, dist:dist, col:f.col, al:f.al, br:br, n:f.n, vbr:vbr, front:front, fcol:fcol, vcol:vcol, vnRef:f.vn, tex:f.tex, verts3d:f.verts});
  }

  /* Tri peintre amélioré, en DEUX groupes pour gérer la transparence :
     1) toutes les faces OPAQUES (caisson + étagères), du plus loin au plus proche
     2) puis les faces TRANSPARENTES (verre), du plus loin au plus proche
     Ainsi le verre est toujours dessiné APRÈS les opaques -> il ne peut jamais
     masquer une étagère ou un panneau derrière lui. Au sein de chaque groupe,
     tri sur la distance 3D réelle (stable pour les panneaux fins). */
  draw.sort(function(a,b){
    var ta=(a.al<1)?1:0, tb=(b.al<1)?1:0;
    if(ta!==tb) return ta-tb;              /* opaques (0) avant verre (1) */
    var d=b.dist-a.dist;                    /* dans le groupe : loin -> proche */
    if(Math.abs(d) > 0.0001) return d;
    return b.z-a.z;
  });

  /* ── RENDU Z-BUFFER (modes pleins : lissé / réaliste / plat) ──
     Passe 1 : opaques (caisson + étagères) avec écriture de profondeur.
     Passe 2 : verre transparent, UNIQUEMENT sa face avant (tournée vers la
     caméra), testé contre la profondeur. Vu de l'arrière, la face avant du verre
     est plus loin que le dos du caisson -> rejetée. Le verre ne se compose que
     là où il est devant un opaque (pas sur le vide) -> pas d'affichage parasite
     en débordement. */
  if(RENDER==='smooth' || RENDER==='real' || RENDER==='flat'){
    zReset(W, H);
    function vcolOf(it, v){
      var c=it.col;
      if(RENDER==='real'){
        if(it.vcol) return it.vcol[v];
        return it.fcol || c;
      }
      var b = (RENDER==='flat') ? it.br : (it.vbr ? it.vbr[v] : it.br);
      return [scale(c[0],b),scale(c[1],b),scale(c[2],b)];
    }
    /* UV par planar mapping : on projette les sommets 3D sur le plan dominant
       de la face (selon sa normale), à l'échelle TEX_SCALE. Évite de stocker des
       UV explicites et marche pour toutes les géométries. */
    function planarUV(it, v){
      var p=it.verts3d[v], n=it.n;
      var ax=Math.abs(n[0]), ay=Math.abs(n[1]), az2=Math.abs(n[2]);
      var u,vv;
      if(ax>=ay && ax>=az2){ u=p[2]; vv=p[1]; }       /* face ~X : plan ZY */
      else if(ay>=ax && ay>=az2){ u=p[0]; vv=p[2]; }  /* face ~Y : plan XZ */
      else { u=p[0]; vv=p[1]; }                        /* face ~Z : plan XY */
      return [u*TEX_SCALE, vv*TEX_SCALE];
    }
    /* passe 1 : opaques (avec ou sans texture). Triangulation ear-clipping pour
       gérer correctement les faces concaves des objets importés. */
    for(var i=0;i<draw.length;i++){
      var it=draw[i];
      if(it.al<1) continue;
      var pts=it.pts, n=pts.length;
      var tri = (n>4 && it.verts3d) ? triangulateFace(it.verts3d, it.n) : null;
      var teximg = it.tex ? getTexImage(it.tex) : null;
      if(teximg){
        function brOf(v){
          if(RENDER==='flat') return it.br;
          if(it.vbr) return it.vbr[v];
          return it.br;
        }
        if(tri){
          for(var t=0;t<tri.length;t+=3){
            var a=tri[t],b=tri[t+1],c=tri[t+2];
            zTriTex(pts[a],pts[b],pts[c],
                    planarUV(it,a),planarUV(it,b),planarUV(it,c),
                    teximg, brOf(a),brOf(b),brOf(c));
          }
        } else {
          for(var t=1;t<n-1;t++){
            zTriTex(pts[0],pts[t],pts[t+1],
                    planarUV(it,0),planarUV(it,t),planarUV(it,t+1),
                    teximg, brOf(0),brOf(t),brOf(t+1));
          }
        }
      } else {
        if(tri){
          for(var t=0;t<tri.length;t+=3){
            var a=tri[t],b=tri[t+1],c=tri[t+2];
            zTri(pts[a],pts[b],pts[c], vcolOf(it,a),vcolOf(it,b),vcolOf(it,c));
          }
        } else {
          for(var t=1;t<n-1;t++){
            zTri(pts[0],pts[t],pts[t+1], vcolOf(it,0),vcolOf(it,t),vcolOf(it,t+1));
          }
        }
      }
    }
    /* passe 2 : verre transparent. Le test de profondeur + la règle "composer
       seulement sur un opaque derrière" suffisent à gérer tous les angles :
       vu de face le verre teinte les étagères, vu de l'arrière il est masqué
       (le caisson est devant lui, pas derrière). */
    for(var i=0;i<draw.length;i++){
      var it=draw[i];
      if(it.al>=1) continue;
      var gc;
      if(RENDER==='real' && it.fcol) gc=[it.fcol[0]|0,it.fcol[1]|0,it.fcol[2]|0];
      else gc=[scale(it.col[0],it.br),scale(it.col[1],it.br),scale(it.col[2],it.br)];
      var pts=it.pts, n=pts.length;
      for(var t=1;t<n-1;t++){
        zTriGlass(pts[0],pts[t],pts[t+1], gc, it.al);
      }
    }
    zBlit(W, H);
    if(RENDER==='real'){ drawSpecularHighlights(draw, cam, W, H); }
    drawCotes(cam,W,H);
    return;
  }

  /* ── MODE LIGNES CACHÉES (rendu croquis type SketchUp) ──
     2 passes :
     1) on remplit toutes les faces AVANT en blanc (tri peintre) : ça crée une
        silhouette pleine blanche qui masque tout ce qui est derrière.
     2) on trace en noir fin uniquement les arêtes "importantes" :
        - SILHOUETTE : l'arête sépare une face vue d'une face cachée (ou n'a
          qu'une face) -> c'est le contour du volume.
        - PLI FRANC : l'angle entre les 2 faces dépasse un seuil (ex. 35°) ->
          arête vive (coins du caisson). Les facettes douces d'une courbe
          (tore, cylindre) ont un angle faible -> PAS tracées -> rendu épuré. */
  if(RENDER==='hidden'){
    /* passe 1 : faces avant en blanc */
    for(var i=0;i<draw.length;i++){
      var it=draw[i];
      if(it.al<1) continue;                 /* ignore le verre */
      if(!it.front) continue;               /* faces avant uniquement */
      ctx.beginPath();
      ctx.moveTo(it.pts[0].x, it.pts[0].y);
      for(var j=1;j<it.pts.length;j++) ctx.lineTo(it.pts[j].x, it.pts[j].y);
      ctx.closePath();
      ctx.fillStyle='#f4f5f7';              /* blanc cassé (faces) */
      ctx.fill();
    }
    /* passe 2 : arêtes silhouette + plis, en noir.
       Chaque arête candidate est testée en OCCLUSION : si le milieu de l'arête
       est recouvert par une face avant plus proche de la caméra, on ne la trace
       pas (sinon on verrait à travers le volume). */
    var camDir=cam.fwd, camPos=[cam.ex,cam.ey,cam.ez];
    /* pré-collecte des faces avant projetées (pour le test d'occlusion).
       On mémorise leur profondeur MINIMALE (sommet le plus proche) pour un
       test conservateur : une face n'occulte une arête que si elle est
       nettement devant (évite d'effacer les arêtes qui bordent la face). */
    var frontFaces=[];
    for(var i=0;i<draw.length;i++){
      var it=draw[i];
      if(it.al<1 || !it.front) continue;
      var zmin=Infinity, zmax=-Infinity;
      for(var k=0;k<it.pts.length;k++){ var z=it.pts[k].z; if(z<zmin)zmin=z; if(z>zmax)zmax=z; }
      frontFaces.push({pts:it.pts, zmin:zmin, zmax:zmax});
    }
    /* point dans polygone (ray casting) */
    function pointInPoly(x,y,pts){
      var inside=false, n=pts.length;
      for(var a=0,b=n-1;a<n;b=a++){
        var xi=pts[a].x, yi=pts[a].y, xj=pts[b].x, yj=pts[b].y;
        if(((yi>y)!==(yj>y)) && (x < (xj-xi)*(y-yi)/(yj-yi)+xi)) inside=!inside;
      }
      return inside;
    }
    ctx.strokeStyle='#15171c'; ctx.lineWidth=1.0; ctx.lineCap='round';
    for(var e=0;e<EDGES.length;e++){
      var ed=EDGES[e], fa=ed.faces, draw_it=false;
      if(fa.length===1){
        if(dot(fa[0],camDir) < 0) draw_it=true;
      } else {
        var f0=dot(fa[0],camDir)<0, f1=dot(fa[1],camDir)<0;
        if(f0 || f1){
          if(f0 !== f1){ draw_it=true; }
          else { if(dot(fa[0],fa[1]) < 0.82) draw_it=true; }
        }
      }
      if(!draw_it) continue;
      var pa=proj(cam, ed.a, W, H), pb=proj(cam, ed.b, W, H);
      if(!pa||!pb) continue;

      /* test d'occlusion : on échantillonne plusieurs points le long de l'arête.
         Si TOUS sont couverts par une face nettement plus proche, l'arête est
         cachée. On compare à zmax de la face (toute la face est devant le point)
         avec une marge, pour ne pas masquer les arêtes qui bordent une face. */
      var hidden_samples=0, total_samples=0;
      for(var s=0.2; s<=0.8; s+=0.3){
        var px=ed.a[0]+(ed.b[0]-ed.a[0])*s;
        var py=ed.a[1]+(ed.b[1]-ed.a[1])*s;
        var pz=ed.a[2]+(ed.b[2]-ed.a[2])*s;
        var pp=proj(cam, [px,py,pz], W, H);
        if(!pp) continue;
        total_samples++;
        for(var ff=0; ff<frontFaces.length; ff++){
          var face=frontFaces[ff];
          /* face nettement devant le point échantillon ? */
          if(face.zmax < pp.z - 0.01 && pointInPoly(pp.x, pp.y, face.pts)){
            hidden_samples++; break;
          }
        }
      }
      /* arête cachée si tous les échantillons testés sont occultés */
      if(total_samples>0 && hidden_samples===total_samples) continue;

      ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.stroke();
    }
    drawCotes(cam,W,H);
    return;
  }

  /* ── Dessin selon le MODE DE RENDU ──
     - smooth : ombrage lissé Gouraud (triangulation + dégradés)
     - flat   : faces pleines + arêtes noires visibles
     - wire   : toutes les arêtes, y compris celles du fond (transparent) */
  for(var i=0;i<draw.length;i++){
    var it=draw[i], c=it.col;

    /* contour de la facette (commun à plusieurs modes) */
    function pathFace(){
      ctx.beginPath();
      ctx.moveTo(it.pts[0].x, it.pts[0].y);
      for(var j=1;j<it.pts.length;j++) ctx.lineTo(it.pts[j].x, it.pts[j].y);
      ctx.closePath();
    }

    /* ----- MODE FILAIRE : on ne trace que les arêtes, pas de remplissage ----- */
    if(RENDER==='wire'){
      pathFace();
      ctx.strokeStyle='rgba(94,184,255,0.85)';
      ctx.lineWidth=0.8; ctx.stroke();
      continue;
    }

    /* ----- MODE PLAT + ARÊTES : faces pleines ombrées + arêtes nettes ----- */
    if(RENDER==='flat'){
      pathFace();
      if(it.al<1) ctx.globalAlpha=it.al;
      ctx.fillStyle='rgb('+scale(c[0],it.br)+','+scale(c[1],it.br)+','+scale(c[2],it.br)+')';
      ctx.fill();
      ctx.globalAlpha=1;
      ctx.strokeStyle='rgba(20,22,28,0.55)';  /* arêtes sombres visibles */
      ctx.lineWidth=0.7; ctx.stroke();
      continue;
    }

    /* ----- MODE RÉALISTE : spéculaire + ambiance + Fresnel ----- */
    if(RENDER==='real'){
      if(it.al<1){
        /* verre : teinte éclairée semi-transparente + reflet */
        pathFace();
        ctx.globalAlpha=it.al;
        var gc=it.fcol||c;
        ctx.fillStyle='rgb('+(gc[0]|0)+','+(gc[1]|0)+','+(gc[2]|0)+')';
        ctx.fill();
        ctx.globalAlpha=1;
        continue;
      }
      if(it.vcol){
        /* surfaces courbes : couleurs réalistes interpolées par triangle */
        var pts=it.pts, vc=it.vcol, n=pts.length;
        for(var t=1; t<n-1; t++){
          fillColorTri(pts[0],pts[t],pts[t+1], vc[0],vc[t],vc[t+1]);
        }
      } else {
        /* faces planes : couleur réaliste unie */
        var fc=it.fcol||c;
        pathFace();
        ctx.fillStyle='rgb('+(fc[0]|0)+','+(fc[1]|0)+','+(fc[2]|0)+')';
        ctx.fill();
        ctx.strokeStyle='rgb('+(fc[0]|0)+','+(fc[1]|0)+','+(fc[2]|0)+')';
        ctx.lineWidth=0.5; ctx.stroke();
      }
      continue;
    }

    /* ----- MODE LISSÉ (défaut) ----- */
    if(it.al<1){
      /* verre : uni semi-transparent */
      pathFace();
      ctx.globalAlpha=it.al;
      ctx.fillStyle='rgb('+scale(c[0],it.br)+','+scale(c[1],it.br)+','+scale(c[2],it.br)+')';
      ctx.fill();
      ctx.globalAlpha=1;
      continue;
    }
    if(it.vbr){
      /* ombrage lissé Gouraud par triangulation */
      var pts=it.pts, vbr=it.vbr, n=pts.length;
      for(var t=1; t<n-1; t++){
        fillSmoothTri(pts[0],pts[t],pts[t+1], vbr[0],vbr[t],vbr[t+1], c);
      }
    } else {
      /* face plate (caisson) : couleur unie + trait de même teinte */
      var br=it.br;
      pathFace();
      ctx.fillStyle='rgb('+scale(c[0],br)+','+scale(c[1],br)+','+scale(c[2],br)+')';
      ctx.fill();
      ctx.strokeStyle='rgb('+scale(c[0],br)+','+scale(c[1],br)+','+scale(c[2],br)+')';
      ctx.lineWidth=0.6; ctx.stroke();
    }
  }
  ctx.globalAlpha=1;
  /* halo spéculaire flou par-dessus (mode réaliste) : reflet lisse sans facettes */
  if(RENDER==='real'){ drawSpecularHighlights(draw, cam, W, H); }
  drawCotes(cam,W,H);
}

/* fillSmoothTri() : remplit un triangle écran (p0,p1,p2) dont les sommets ont
   les luminosités (b0,b1,b2), avec la couleur de base c. Le remplissage est un
   dégradé linéaire placé dans la direction du gradient de luminosité, ce qui
   approxime très fidèlement l'interpolation de Gouraud sur le triangle.
   Un léger débord (stroke de même couleur) referme les coutures entre triangles. */
function fillSmoothTri(p0,p1,p2, b0,b1,b2, c){
  /* Cherche l'axe de variation : on résout la luminosité comme fonction affine
     b(x,y)=ax+by+d sur le triangle, puis on place le dégradé selon (a,b). */
  var x0=p0.x,y0=p0.y, x1=p1.x,y1=p1.y, x2=p2.x,y2=p2.y;
  /* déterminant du système (aire x2) */
  var det=(y1-y2)*(x0-x2)+(x2-x1)*(y0-y2);
  ctx.beginPath();
  ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.lineTo(x2,y2); ctx.closePath();

  if(Math.abs(det)<1e-6){
    /* triangle dégénéré : couleur moyenne */
    var bm=(b0+b1+b2)/3;
    ctx.fillStyle='rgb('+scale(c[0],bm)+','+scale(c[1],bm)+','+scale(c[2],bm)+')';
    ctx.fill(); return;
  }
  /* gradient de luminosité (a,b) dans le plan écran */
  var a=((b0-b2)*(y1-y2)+(b1-b2)*(y2-y0))/det;
  var b=((b0-b2)*(x2-x1)+(b1-b2)*(x0-x2))/det;
  var glen=Math.sqrt(a*a+b*b);

  if(glen<1e-5){
    /* luminosité uniforme : couleur unie */
    ctx.fillStyle='rgb('+scale(c[0],b0)+','+scale(c[1],b0)+','+scale(c[2],b0)+')';
    ctx.fill();
  } else {
    /* direction du dégradé = sens de variation de la luminosité */
    var ux=a/glen, uy=b/glen;
    /* projette les 3 sommets sur cet axe pour trouver les extrêmes */
    var s0=x0*ux+y0*uy, s1=x1*ux+y1*uy, s2=x2*ux+y2*uy;
    /* luminosité min/max alignées sur les extrêmes de l'axe */
    var arr=[{s:s0,b:b0},{s:s1,b:b1},{s:s2,b:b2}];
    arr.sort(function(A,B){return A.s-B.s;});
    var gx1=ux*arr[0].s, gy1=uy*arr[0].s;
    var gx2=ux*arr[2].s, gy2=uy*arr[2].s;
    if(!isFinite(gx1)||!isFinite(gx2)||(Math.abs(gx2-gx1)<0.3&&Math.abs(gy2-gy1)<0.3)){
      var bm=(b0+b1+b2)/3;
      ctx.fillStyle='rgb('+scale(c[0],bm)+','+scale(c[1],bm)+','+scale(c[2],bm)+')';
    } else {
      var grad=ctx.createLinearGradient(gx1,gy1,gx2,gy2);
      var lo=arr[0].b, hi=arr[2].b;
      grad.addColorStop(0,'rgb('+scale(c[0],lo)+','+scale(c[1],lo)+','+scale(c[2],lo)+')');
      grad.addColorStop(1,'rgb('+scale(c[0],hi)+','+scale(c[1],hi)+','+scale(c[2],hi)+')');
      ctx.fillStyle=grad;
    }
    ctx.fill();
  }
  /* léger débord pour masquer la couture entre triangles voisins */
  var bm2=(b0+b1+b2)/3;
  ctx.strokeStyle='rgb('+scale(c[0],bm2)+','+scale(c[1],bm2)+','+scale(c[2],bm2)+')';
  ctx.lineWidth=0.7; ctx.stroke();
}

/* fillColorTri() : remplit un triangle écran (p0,p1,p2) dont les 3 sommets ont
   des COULEURS RGB (c0,c1,c2) déjà éclairées. Utilisé par le mode réaliste pour
   interpoler le spéculaire/Fresnel sur les surfaces courbes. On place un dégradé
   linéaire entre les deux sommets les plus contrastés (approximation fidèle de
   l'interpolation des couleurs sur le triangle). */
function fillColorTri(p0,p1,p2, c0,c1,c2){
  ctx.beginPath();
  ctx.moveTo(p0.x,p0.y); ctx.lineTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.closePath();
  /* luminances pour trouver les sommets extrêmes */
  function lum(c){ return c[0]*0.299+c[1]*0.587+c[2]*0.114; }
  var l0=lum(c0), l1=lum(c1), l2=lum(c2);
  /* sommets min et max de luminance */
  var pa,pb,ca,cb;
  if(l0<=l1 && l0<=l2){ pa=p0; ca=c0; if(l1>=l2){pb=p1;cb=c1;}else{pb=p2;cb=c2;} }
  else if(l1<=l0 && l1<=l2){ pa=p1; ca=c1; if(l0>=l2){pb=p0;cb=c0;}else{pb=p2;cb=c2;} }
  else { pa=p2; ca=c2; if(l0>=l1){pb=p0;cb=c0;}else{pb=p1;cb=c1;} }
  var dx=pb.x-pa.x, dy=pb.y-pa.y;
  if(Math.abs(dx)<0.3 && Math.abs(dy)<0.3){
    /* couleurs ~égales : remplissage moyen */
    var mr=(c0[0]+c1[0]+c2[0])/3|0, mg=(c0[1]+c1[1]+c2[1])/3|0, mb=(c0[2]+c1[2]+c2[2])/3|0;
    ctx.fillStyle='rgb('+mr+','+mg+','+mb+')';
  } else {
    var grad=ctx.createLinearGradient(pa.x,pa.y, pb.x,pb.y);
    grad.addColorStop(0,'rgb('+(ca[0]|0)+','+(ca[1]|0)+','+(ca[2]|0)+')');
    grad.addColorStop(1,'rgb('+(cb[0]|0)+','+(cb[1]|0)+','+(cb[2]|0)+')');
    ctx.fillStyle=grad;
  }
  ctx.fill();
  /* débord léger teinte moyenne pour masquer les coutures */
  var mr2=(c0[0]+c1[0]+c2[0])/3|0, mg2=(c0[1]+c1[1]+c2[1])/3|0, mb2=(c0[2]+c1[2]+c2[2])/3|0;
  ctx.strokeStyle='rgb('+mr2+','+mg2+','+mb2+')';
  ctx.lineWidth=0.7; ctx.stroke();
}

/* drawCotes() : trace les cotes largeur (orange) et hauteur (bleu).
   Extrait dans sa propre fonction car appelé depuis 2 endroits (sphère + reste). */
function drawCotes(cam,W,H){
  var d=DIMS, zf=d.d/2+0.05;
  COTE_HITS=[];   /* zones cliquables des cotes (remplies ci-dessous) */
  /* COTE LARGEUR (orange) : le long du bord avant au sol */
  var la=proj(cam,[-d.w/2,0,zf],W,H), lb=proj(cam,[d.w/2,0,zf],W,H);
  if(la&&lb){
    ctx.strokeStyle='#ff8a3d'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(la.x,la.y); ctx.lineTo(lb.x,lb.y); ctx.stroke();
    ctx.fillStyle='#ff8a3d'; ctx.font='bold 10px monospace'; ctx.textAlign='center';
    var lx=(la.x+lb.x)/2, ly=(la.y+lb.y)/2-6;
    ctx.fillText(Math.round(d.w*100)+' cm', lx, ly);
    COTE_HITS.push({key:'w', x:lx, y:ly, color:'#ff8a3d'});
  }
  /* COTE HAUTEUR (bleu) : verticale à gauche */
  var ha=proj(cam,[-d.w/2-0.2,0,zf],W,H), hb=proj(cam,[-d.w/2-0.2,d.h,zf],W,H);
  if(ha&&hb){
    ctx.strokeStyle='#5eb8ff'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(ha.x,ha.y); ctx.lineTo(hb.x,hb.y); ctx.stroke();
    ctx.fillStyle='#5eb8ff'; ctx.font='bold 10px monospace'; ctx.textAlign='right';
    var hx=Math.min(ha.x,hb.x)-4, hy=(ha.y+hb.y)/2;
    ctx.fillText(Math.round(d.h*100)+' cm', hx, hy);
    COTE_HITS.push({key:'h', x:hx-18, y:hy, color:'#5eb8ff'});
  }
  /* COTE PROFONDEUR (vert) : le long du bord latéral droit au sol */
  var xf=d.w/2+0.05;
  var pa=proj(cam,[xf,0,d.d/2],W,H), pb=proj(cam,[xf,0,-d.d/2],W,H);
  if(pa&&pb){
    ctx.strokeStyle='#6ee7a0'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.stroke();
    ctx.fillStyle='#6ee7a0'; ctx.font='bold 10px monospace'; ctx.textAlign='left';
    var px=Math.max(pa.x,pb.x)+4, py=(pa.y+pb.y)/2;
    ctx.fillText(Math.round(d.d*100)+' cm', px, py);
    COTE_HITS.push({key:'d', x:px+18, y:py, color:'#6ee7a0'});
  }
}

/* ============================================================================
   6. CONTRÔLES — orbite et zoom, à la souris et au tactile
   ============================================================================ */
var drag=false, lastX=0, lastY=0, lastPinch=0;

/* Zones cliquables des cotes (remplies par drawCotes à chaque frame).
   Chaque entrée : {key:'w'|'h'|'d', x, y, color}. Sert à l'édition au double-clic. */
var COTE_HITS=[];

/* --- Souris --- */
cv.addEventListener('mousedown', function(e){ drag=true; lastX=e.clientX; lastY=e.clientY; });
window.addEventListener('mouseup', function(){ drag=false; });
window.addEventListener('mousemove', function(e){
  if(!drag) return;
  CAM.th -= (e.clientX-lastX)*0.007;              /* rotation horizontale */
  CAM.ph -= (e.clientY-lastY)*0.007;              /* rotation verticale   */
  CAM.ph = Math.max(0.08, Math.min(Math.PI*0.48, CAM.ph)); /* bornes      */
  lastX=e.clientX; lastY=e.clientY;
  DIRTY=true;
});
cv.addEventListener('wheel', function(e){
  CAM.r = Math.max(0.5, Math.min(14, CAM.r + e.deltaY*0.003)); DIRTY=true; /* zoom */
  e.preventDefault();
}, {passive:false});

/* --- Édition d'une cote au DOUBLE-CLIC ---
   On cherche la cote la plus proche du curseur ; si elle est assez proche, on
   superpose un petit champ de saisie à sa position. La valeur saisie (en cm)
   met à jour le paramètre correspondant (w/h/d) du meuble. */
cv.addEventListener('dblclick', function(e){
  if(MODE!=='meuble') return;                    /* cotes éditables sur le meuble */
  var rect=cv.getBoundingClientRect();
  var mx=e.clientX-rect.left, my=e.clientY-rect.top;
  /* cote la plus proche */
  var best=null, bestD=Infinity;
  COTE_HITS.forEach(function(h){
    var dx=h.x-mx, dy=h.y-my, dd=dx*dx+dy*dy;
    if(dd<bestD){ bestD=dd; best=h; }
  });
  if(!best || bestD>40*40) return;               /* trop loin d'une cote */
  openCoteEditor(best, e.clientX, e.clientY);
});

/* openCoteEditor() : champ de saisie flottant pour éditer une dimension. */
function openCoteEditor(hit, clientX, clientY){
  /* retire un éventuel éditeur déjà ouvert */
  var old=document.getElementById('cote-editor'); if(old) old.remove();
  var f=curFields().filter(function(x){return x.key===hit.key || x.k===hit.key;})[0]
       || {min:5,max:400,step:1,k:hit.key};
  var cur=Math.round(P[hit.key]);
  var inp=document.createElement('input');
  inp.id='cote-editor'; inp.type='number';
  inp.value=cur; inp.min=f.min; inp.max=f.max; inp.step=f.step||1;
  inp.style.cssText='position:fixed;left:'+(clientX-30)+'px;top:'+(clientY-14)+'px;'+
    'width:64px;height:26px;font:bold 13px monospace;text-align:center;z-index:9999;'+
    'border:2px solid '+hit.color+';border-radius:5px;background:#12151b;color:'+hit.color+';'+
    'outline:none;padding:0 4px;';
  document.body.appendChild(inp);
  inp.focus(); inp.select();
  function commit(){
    var v=parseFloat(inp.value);
    if(!isNaN(v)){
      v=Math.max(f.min, Math.min(f.max, v));
      P[hit.key]=v;
      build(); updateDims();
      buildUI();                  /* synchronise les champs du panneau */
    }
    inp.remove();
  }
  inp.addEventListener('keydown', function(ev){
    if(ev.key==='Enter'){ commit(); }
    else if(ev.key==='Escape'){ inp.remove(); }
  });
  inp.addEventListener('blur', commit);
}

/* --- Tactile : 1 doigt = orbite, 2 doigts = zoom (pincement) --- */
cv.addEventListener('touchstart', function(e){
  e.preventDefault();
  if(e.touches.length===1){ drag=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; }
  if(e.touches.length===2){
    drag=false;
    var dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
    lastPinch=Math.sqrt(dx*dx+dy*dy);
  }
}, {passive:false});
cv.addEventListener('touchmove', function(e){
  e.preventDefault();
  DIRTY=true;
  if(e.touches.length===1 && drag){
    CAM.th -= (e.touches[0].clientX-lastX)*0.007;
    CAM.ph -= (e.touches[0].clientY-lastY)*0.007;
    CAM.ph = Math.max(0.08, Math.min(Math.PI*0.48, CAM.ph));
    lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  }
  if(e.touches.length===2){
    var dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
    var p=Math.sqrt(dx*dx+dy*dy);
    CAM.r = Math.max(0.5, Math.min(14, CAM.r - (p-lastPinch)*0.01));
    lastPinch=p;
  }
}, {passive:false});
cv.addEventListener('touchend', function(e){
  drag=false;
  /* double-tap pour éditer une cote (équivalent tactile du double-clic) */
  if(MODE==='meuble'){
    var now=Date.now();
    var t=e.changedTouches[0];
    if(now-_lastTap < 320 && t){
      var rect=cv.getBoundingClientRect();
      var mx=t.clientX-rect.left, my=t.clientY-rect.top;
      var best=null, bestD=Infinity;
      COTE_HITS.forEach(function(h){
        var dx=h.x-mx, dy=h.y-my, dd=dx*dx+dy*dy;
        if(dd<bestD){ bestD=dd; best=h; }
      });
      if(best && bestD<=50*50){ openCoteEditor(best, t.clientX, t.clientY); }
    }
    _lastTap=now;
  }
}, {passive:false});
var _lastTap=0;


/* ============================================================================
   7. INTERFACE
   - buildUI()      : génère les sliders selon le mode actif (meuble/forme)
   - buildShapeGrid : génère les boutons de sélection de forme
   - setupTabs      : branche les onglets Meuble/Formes
   - updateDims     : met à jour l'étiquette dimensions
   ============================================================================ */

/* Renvoie le jeu de champs + l'objet de valeurs selon le mode courant */
function curFields(){ return MODE==='forme' ? FIELDS_FORME : FIELDS_MEUBLE; }
function curParams(){ return MODE==='forme' ? PF : P; }

function buildUI(){
  var host=document.getElementById('params');
  host.innerHTML='';
  var params=curParams();
  curFields().forEach(function(f){
    var val = (params[f.k]!==undefined) ? params[f.k] : f.min;
    var fld=document.createElement('div'); fld.className='fld';
    fld.innerHTML =
      '<div class="fh"><label>'+f.l+(f.u?' <span class="u">'+f.u+'</span>':'')+'</label>'+
      '<input type="number" min="'+f.min+'" max="'+f.max+'" step="'+f.step+'" value="'+val+'"></div>'+
      '<input type="range" min="'+f.min+'" max="'+f.max+'" step="'+f.step+'" value="'+val+'">';
    var num=fld.querySelector('input[type=number]');
    var rng=fld.querySelector('input[type=range]');

    /* apply() : borne, synchronise les deux champs, reconstruit l'objet courant */
    function apply(v){
      v = Math.max(f.min, Math.min(f.max, v));
      curParams()[f.k]=v; num.value=v; rng.value=v;
      build();
      updateDims();
    }
    rng.oninput = function(){ apply(+rng.value); };
    num.oninput = function(){ if(!isNaN(parseFloat(num.value))) apply(parseFloat(num.value)); };
    num.onblur  = function(){ apply(isNaN(parseFloat(num.value))?val:parseFloat(num.value)); };

    host.appendChild(fld);
  });
}

   INTERFACE DU MUR MULTICOUCHE
   Génère : dimensions (longueur/hauteur), puis chaque couche dans l'ordre
   extérieur->intérieur, avec son épaisseur (slider+saisie). Les couches
   d'isolation ont un interrupteur d'activation. Le porteur a un sélecteur
   de matériau. Le total d'épaisseur est rappelé en bas.
   ---------------------------------------------------------------------------- */
function buildWallUI(){
  var host=document.getElementById('params');
  host.innerHTML='';

  /* helper : un réglage épaisseur/longueur (slider + saisie synchronisés) */
  function slider(label, unit, key, min, max, step){
    var val=PM[key];
    var fld=document.createElement('div'); fld.className='fld';
    fld.innerHTML=
      '<div class="fh"><label>'+label+(unit?' <span class="u">'+unit+'</span>':'')+'</label>'+
      '<input type="number" min="'+min+'" max="'+max+'" step="'+step+'" value="'+val+'"></div>'+
      '<input type="range" min="'+min+'" max="'+max+'" step="'+step+'" value="'+val+'">';
    var num=fld.querySelector('input[type=number]'), rng=fld.querySelector('input[type=range]');
    function apply(v){ v=Math.max(min,Math.min(max,v)); PM[key]=v; num.value=v; rng.value=v; build(); updateDims(); }
    rng.oninput=function(){ apply(+rng.value); };
    num.oninput=function(){ if(!isNaN(parseFloat(num.value))) apply(parseFloat(num.value)); };
    num.onblur =function(){ apply(isNaN(parseFloat(num.value))?val:parseFloat(num.value)); };
    host.appendChild(fld);
  }

  /* helper : interrupteur d'activation (couche isolation) */
  function toggle(label, key){
    var on=!!PM[key];
    var row=document.createElement('div'); row.className='wall-toggle';
    row.innerHTML='<span>'+label+'</span>'+
      '<button class="'+(on?'on':'')+'">'+(on?'Activé':'Désactivé')+'</button>';
    row.querySelector('button').onclick=function(){
      PM[key]=PM[key]?0:1; build(); updateDims(); buildWallUI();
    };
    host.appendChild(row);
  }

  /* helper : sélecteur de matériau du porteur */
  function matSelect(){
    var lbl=document.createElement('div'); lbl.className='slbl'; lbl.style.marginTop='2px';
    lbl.textContent='Matériau porteur'; host.appendChild(lbl);
    var grid=document.createElement('div'); grid.className='mat-grid';

  }

  /* en-tête de groupe */
  function group(txt){
    var d=document.createElement('div'); d.className='slbl'; d.style.marginTop='8px';
    d.textContent=txt; host.appendChild(d);
  }

  /* --- DIMENSIONS --- */
  group('Dimensions');
  slider('Longueur','cm','len',50,1200,1);
  slider('Hauteur','cm','hgt',50,500,1);

  /* --- COUCHES (extérieur -> intérieur) --- */
  group('Extérieur');
  slider('Finition ext.','cm','finExt',0,8,0.1);
  toggle('Isolation ext. (ITE)','isoExtOn');
  if(PM.isoExtOn) slider('Épaisseur ITE','cm','isoExt',2,30,0.5);

  group('Mur porteur');
  matSelect();
  slider('Épaisseur porteur','cm','core',5,50,0.5);

  group('Intérieur');
  toggle('Isolation int. (ITI)','isoIntOn');
  if(PM.isoIntOn) slider('Épaisseur ITI','cm','isoInt',2,20,0.5);
  slider('Finition int.','cm','finInt',0,8,0.1);

  /* --- TOTAL --- */
  var tot=document.createElement('div'); tot.className='wall-total';
  var totalCm=Math.round(DIMS.d*1000)/10;
  tot.innerHTML='Épaisseur totale <b>'+totalCm+' cm</b>';
  host.appendChild(tot);
}

/* ----------------------------------------------------------------------------
   UI GÉNÉRIQUE D'OBJET PARAMÉTRIQUE
   Construit une interface à partir d'une config déclarative :
   - params : objet d'état (ex. PP, PB, PG)
   - groups : liste de groupes { title, fields:[...] }
       field type 'slider'  : {label, unit, key, min, max, step}
       field type 'mat'     : {label, key, mats:[{id,l,c}]}    (sélecteur matériau)
       field type 'choice'  : {label, key, options:[{id,l}]}   (sélecteur d'option)
   Reconstruit l'objet (build) à chaque changement. Réutilisable pour tout objet.
   ---------------------------------------------------------------------------- */
function buildObjUI(params, groups, rebuildUI){
  var host=document.getElementById('params');
  host.innerHTML='';
  function grp(txt){ var d=document.createElement('div'); d.className='slbl'; d.style.marginTop='8px'; d.textContent=txt; host.appendChild(d); }

  function slider(f){
    var val=params[f.key];
    var fld=document.createElement('div'); fld.className='fld';
    fld.innerHTML='<div class="fh"><label>'+f.label+(f.unit?' <span class="u">'+f.unit+'</span>':'')+'</label>'+
      '<input type="number" min="'+f.min+'" max="'+f.max+'" step="'+f.step+'" value="'+val+'"></div>'+
      '<input type="range" min="'+f.min+'" max="'+f.max+'" step="'+f.step+'" value="'+val+'">';
    var num=fld.querySelector('input[type=number]'), rng=fld.querySelector('input[type=range]');
    function apply(v){ v=Math.max(f.min,Math.min(f.max,v)); params[f.key]=v; num.value=v; rng.value=v; build(); updateDims(); }
    rng.oninput=function(){ apply(+rng.value); };
    num.oninput=function(){ if(!isNaN(parseFloat(num.value))) apply(parseFloat(num.value)); };
    num.onblur =function(){ apply(isNaN(parseFloat(num.value))?val:parseFloat(num.value)); };
    host.appendChild(fld);
  }
  function matSel(f){
    if(f.label){ var lbl=document.createElement('div'); lbl.className='slbl'; lbl.style.marginTop='2px'; lbl.textContent=f.label; host.appendChild(lbl); }
    var grid=document.createElement('div'); grid.className='mat-grid';
    f.mats.forEach(function(m){
      var b=document.createElement('button'); b.textContent=m.l;
      if(m.id===params[f.key]) b.className='on';
      b.onclick=function(){ params[f.key]=m.id; build(); rebuildUI(); };
      grid.appendChild(b);
    });
    host.appendChild(grid);
  }
  function choice(f){
    if(f.label){ var lbl=document.createElement('div'); lbl.className='slbl'; lbl.style.marginTop='2px'; lbl.textContent=f.label; host.appendChild(lbl); }
    var grid=document.createElement('div'); grid.className='mat-grid';
    f.options.forEach(function(o){
      var b=document.createElement('button'); b.textContent=o.l;
      if(o.id===params[f.key]) b.className='on';
      b.onclick=function(){ params[f.key]=o.id; build(); rebuildUI(); };
      grid.appendChild(b);
    });
    host.appendChild(grid);
  }

  groups.forEach(function(g){
    if(g.title) grp(g.title);
    g.fields.forEach(function(f){
      if(f.type==='slider') slider(f);
      else if(f.type==='mat') matSel(f);
      else if(f.type==='choice') choice(f);
      else if(f.type==='steelSerie') steelSerie(f);
      else if(f.type==='steelSize') steelSize(f);
    });
  });

  /* sélecteur de série de profil (IPE, IPN, HEA, HEB, UPN) */
  function steelSerie(f){
    var grid=document.createElement('div'); grid.className='mat-grid';
    STEEL_SERIES.forEach(function(serie){
      var b=document.createElement('button'); b.textContent=STEEL_PROFILES[serie].label;
      if(serie===params[f.key]) b.className='on';
      b.onclick=function(){
        params[f.key]=serie;
        /* recale la taille sur une valeur valide de la nouvelle série */
        var sizes=steelSizes(serie);
        if(sizes.indexOf(params[f.sizeKey])<0) params[f.sizeKey]=sizes[Math.floor(sizes.length/2)];
        build(); rebuildUI();
      };
      grid.appendChild(b);
    });
    host.appendChild(grid);
  }
  /* sélecteur de taille (menu déroulant des tailles de la série) */
  function steelSize(f){
    var serie=params[f.serieKey];
    var sizes=steelSizes(serie);
    var lbl=document.createElement('div'); lbl.className='fh';
    lbl.innerHTML='<label>Taille '+STEEL_PROFILES[serie].label+'</label>';
    host.appendChild(lbl);
    var sel=document.createElement('select'); sel.className='steel-select';
    sizes.forEach(function(sz){
      var o=document.createElement('option'); o.value=sz;
      var d=STEEL_PROFILES[serie].sizes[sz];
      o.textContent=STEEL_PROFILES[serie].label+' '+sz+'  ('+d[0]+'×'+d[1]+' mm)';
      if(sz===params[f.key]) o.selected=true;
      sel.appendChild(o);
    });
    sel.onchange=function(){ params[f.key]=+sel.value; build(); rebuildUI(); };
    host.appendChild(sel);
  }
}

/* ----------------------------------------------------------------------------
   INTERFACE DES FINITIONS
   - buildFinishElems() : onglets de choix de l'élément (corps/étagères/portes
     en mode meuble ; rien en mode forme car un seul élément)
   - buildFinishPanel() : palette RAL + color picker + textures pour l'élément
     sélectionné (FINISH_TARGET)
   ---------------------------------------------------------------------------- */

/* État interne : mode d'affichage du panneau finition (ral | tex) */
var FINISH_VIEW = 'ral';
var RAL_FAM = '7';        /* famille RAL active (gris par défaut) */
var RAL_SEARCH = '';      /* texte de recherche par code RAL */

/* Renvoie la clé de finition de l'élément courant selon le mode */
function finishKey(){
  if(MODE==='forme') return 'forme';
  if(MODE==='quadripod') return 'fab';
  if(MODE==='porte') return FINISH_TARGET;     /* bati | panneau | poignee */
  if(MODE==='fenetre') return FINISH_TARGET;   /* fcadre | fouvrant | fpoignee */
  if(MODE==='murrideau') return FINISH_TARGET; /* cwframe | cwspandrel | cwvent */
  if(MODE==='furn') return FINISH_TARGET;      /* fstruct | fgarn */
  if(GENERIC_FINISH_MODES[MODE]) return 'objet';
  return FINISH_TARGET;   /* corps | etagere | porte */
}

/* Onglets de sélection d'élément (corps / étagères / portes) — meuble seulement */
function buildFinishElems(){
  var host=document.getElementById('finish-elems');
  host.innerHTML='';
  var elems = (MODE==='meuble')?FINISH_ELEMS_MEUBLE : (MODE==='porte')?FINISH_ELEMS_PORTE : (MODE==='fenetre')?FINISH_ELEMS_FENETRE : (MODE==='murrideau')?FINISH_ELEMS_MURRIDEAU : (MODE==='furn')?FINISH_ELEMS_FURN : null;
  if(!elems){ host.style.display='none'; return; }
  /* recale la cible si elle n'appartient pas a l'objet courant */
  if(!elems.some(function(e){return e.id===FINISH_TARGET;})) FINISH_TARGET=elems[0].id;
  host.style.display='flex';
  elems.forEach(function(el){
    var b=document.createElement('button');
    b.textContent=el.l;
    if(el.id===FINISH_TARGET) b.className='on';
    b.onclick=function(){ FINISH_TARGET=el.id; buildFinishElems(); buildFinishPanel(); };
    host.appendChild(b);
  });
}

/* Panneau RAL + picker + textures pour l'élément courant */
/* Panneau Finition des produits fabricants (rendu WebGL PBR).
   Le shader n'echantillonne pas de texture image : on propose donc une TEINTE
   RAL globale appliquee via l'uniform d'override (ovOn/ovCol), en complement des
   materiaux d'origine du produit. */
function buildProductFinishPanel(host){
  var tog=document.createElement('div'); tog.className='finish-tabs';
  [['auto','Matériaux d’origine'],['custom','Teinte perso.']].forEach(function(p){
    var b=document.createElement('button'); b.textContent=p[1];
    if((p[0]==='custom')===PROD_OVERRIDE) b.className='on';
    b.onclick=function(){ PROD_OVERRIDE=(p[0]==='custom'); if(WGL.ready) WGL.render(); buildFinishPanel(); };
    tog.appendChild(b);
  });
  host.appendChild(tog);
  if(!PROD_OVERRIDE){
    var note=document.createElement('div'); note.className='exp-note';
    note.textContent='Le produit conserve ses matériaux d’origine (rendu PBR). Passez en « Teinte perso. » pour le recolorer dans une teinte RAL.';
    host.appendChild(note); return;
  }
  var current=FINISH.fab;
  /* familles RAL */
  var famRow=document.createElement('div'); famRow.className='ral-fam';
  RAL_FAMILIES.forEach(function(fam){
    var b=document.createElement('button'); b.textContent=fam.label;
    if(fam.id===RAL_FAM) b.className='on';
    b.onclick=function(){ RAL_FAM=fam.id; buildFinishPanel(); };
    famRow.appendChild(b);
  });
  host.appendChild(famRow);
  /* recherche par code RAL */
  var search=document.createElement('input'); search.type='text';
  search.placeholder='Rechercher un code RAL…'; search.className='ral-search'; search.value=RAL_SEARCH;
  search.oninput=function(){ RAL_SEARCH=search.value; renderGrid(); search.focus(); };
  host.appendChild(search);
  var gridHost=document.createElement('div'); host.appendChild(gridHost);
  function renderGrid(){
    gridHost.innerHTML='';
    var list;
    if(RAL_SEARCH.trim()){ var q=RAL_SEARCH.trim().toLowerCase(); list=RAL.filter(function(r){ return r.c.toLowerCase().indexOf(q)>=0; }); }
    else { var fam=RAL_FAMILIES.filter(function(f){return f.id===RAL_FAM;})[0]||RAL_FAMILIES[0]; list=fam.teintes; }
    var grid=document.createElement('div'); grid.className='ral-grid';
    list.forEach(function(r){
      var rgb=hexToRgb(r.h);
      var cell=document.createElement('div'); cell.style.background=r.h; cell.title=r.c;
      if(current[0]===rgb[0]&&current[1]===rgb[1]&&current[2]===rgb[2]) cell.className='on';
      cell.onclick=function(){ FINISH.fab=hexToRgb(r.h); if(WGL.ready) WGL.render(); buildFinishPanel(); };
      grid.appendChild(cell);
    });
    gridHost.appendChild(grid);
    var info=document.createElement('div'); info.className='ral-info';
    info.textContent=list.length+' teinte'+(list.length>1?'s':'')+' · RAL Classic';
    gridHost.appendChild(info);
  }
  renderGrid();
  /* couleur libre */
  var pickLbl=document.createElement('div'); pickLbl.className='slbl'; pickLbl.style.marginTop='8px';
  pickLbl.textContent='Couleur libre'; host.appendChild(pickLbl);
  var ci=document.createElement('input'); ci.type='color'; ci.className='free-pick';
  ci.value='#'+current.map(function(x){var s=x.toString(16);return s.length<2?'0'+s:s;}).join('');
  ci.oninput=function(e){ FINISH.fab=hexToRgb(e.target.value); if(WGL.ready) WGL.render(); };
  host.appendChild(ci);
}
function buildFinishPanel(){
  var host=document.getElementById('finish-panel');
  host.innerHTML='';
  var key=finishKey();
  if(MODE==='quadripod'){ buildProductFinishPanel(host); return; }
  /* Objets generiques : bascule matiere native (presets/couches) <-> matiere personnalisee */
  if(GENERIC_FINISH_MODES[MODE]){
    var tog=document.createElement('div'); tog.className='finish-tabs';
    [['auto','Matériau natif'],['custom','Matière perso.']].forEach(function(p){
      var b=document.createElement('button'); b.textContent=p[1];
      if((p[0]==='custom')===OBJ_OVERRIDE) b.className='on';
      b.onclick=function(){ OBJ_OVERRIDE=(p[0]==='custom'); build(); buildFinishPanel(); };
      tog.appendChild(b);
    });
    host.appendChild(tog);
    if(!OBJ_OVERRIDE){
      var note=document.createElement('div'); note.className='exp-note';
      note.textContent='L’objet utilise son matériau natif (presets / couches ci-dessus). Passez en « Matière perso. » pour appliquer une teinte RAL ou une texture à tout l’objet.';
      host.appendChild(note);
      return;
    }
  }
  var current=FINISH[key];

  /* onglets RAL / Texture */
  var tabs=document.createElement('div'); tabs.className='finish-tabs';
  [['ral','RAL'],['tex','Texture']].forEach(function(pair){
    var b=document.createElement('button');
    b.textContent=pair[1];
    if(FINISH_VIEW===pair[0]) b.className='on';
    b.onclick=function(){ FINISH_VIEW=pair[0]; buildFinishPanel(); };
    tabs.appendChild(b);
  });
  host.appendChild(tabs);

  if(FINISH_VIEW==='ral'){
    /* sélecteur de famille RAL (Jaunes, Rouges, Bleus...) */
    var famRow=document.createElement('div'); famRow.className='ral-fam';
    RAL_FAMILIES.forEach(function(fam){
      var b=document.createElement('button'); b.textContent=fam.label;
      if(fam.id===RAL_FAM) b.className='on';
      b.onclick=function(){ RAL_FAM=fam.id; buildFinishPanel(); };
      famRow.appendChild(b);
    });
    host.appendChild(famRow);

    /* champ de recherche par code RAL (ex: "7016") */
    var search=document.createElement('input'); search.type='text';
    search.placeholder='Rechercher un code RAL…'; search.className='ral-search';
    search.value=RAL_SEARCH;
    search.oninput=function(){ RAL_SEARCH=search.value; renderRalGrid(); search.focus(); };
    host.appendChild(search);

    var gridHost=document.createElement('div');
    host.appendChild(gridHost);

    /* grille des teintes : famille active OU résultats de recherche */
    function renderRalGrid(){
      gridHost.innerHTML='';
      var list;
      if(RAL_SEARCH.trim()){
        var q=RAL_SEARCH.trim().toLowerCase();
        list=RAL.filter(function(r){ return r.c.toLowerCase().indexOf(q)>=0; });
      } else {
        var fam=RAL_FAMILIES.filter(function(f){return f.id===RAL_FAM;})[0]||RAL_FAMILIES[0];
        list=fam.teintes;
      }
      var grid=document.createElement('div'); grid.className='ral-grid';
      list.forEach(function(r){
        var rgb=hexToRgb(r.h);
        var cell=document.createElement('div');
        cell.style.background=r.h; cell.title=r.c;
        if(current[0]===rgb[0]&&current[1]===rgb[1]&&current[2]===rgb[2]) cell.className='on';
        cell.onclick=function(){ FINISH[key]=rgb; build(); buildFinishPanel(); };
        grid.appendChild(cell);
      });
      gridHost.appendChild(grid);
      /* libellé du code RAL au survol/sélection : on affiche le nombre */
      var info=document.createElement('div'); info.className='ral-info';
      info.textContent=list.length+' teinte'+(list.length>1?'s':'')+' · RAL Classic';
      gridHost.appendChild(info);
    }
    renderRalGrid();

    /* color picker libre */
    var pickLbl=document.createElement('div'); pickLbl.className='slbl'; pickLbl.style.marginTop='8px';
    pickLbl.textContent='Couleur libre'; host.appendChild(pickLbl);
    var ci=document.createElement('input'); ci.type='color'; ci.className='free-pick';
    ci.value='#'+current.map(function(x){var s=x.toString(16);return s.length<2?'0'+s:s;}).join('');
    ci.oninput=function(e){ FINISH[key]=hexToRgb(e.target.value); build(); };
    host.appendChild(ci);
  } else {
    /* bouton "Aucune" (revenir à la couleur unie) */
    var none=document.createElement('button'); none.className='tex-none';
    none.textContent=FINISH_TEX[key]? '✕ Retirer la texture' : 'Aucune texture (couleur unie)';
    none.onclick=function(){ FINISH_TEX[key]=null; build(); buildFinishPanel(); };
    host.appendChild(none);

    /* sélecteur de famille de textures (Bois, Pierre, Métal...) */
    var famRow=document.createElement('div'); famRow.className='ral-fam';
    TEXTURE_FAMILIES.forEach(function(fam){
      var b=document.createElement('button'); b.textContent=fam.label;
      if(fam.id===TEX_FAM) b.className='on';
      b.onclick=function(){ TEX_FAM=fam.id; buildFinishPanel(); };
      famRow.appendChild(b);
    });
    host.appendChild(famRow);

    /* grille des textures de la famille active, avec aperçus RÉELS */
    var fam=TEXTURE_FAMILIES.filter(function(f){return f.id===TEX_FAM;})[0]||TEXTURE_FAMILIES[0];
    var grid=document.createElement('div'); grid.className='tex-grid';
    fam.items.forEach(function(tx){
      var cell=document.createElement('div'); cell.className='tex-cell';
      if(FINISH_TEX[key]===tx.id) cell.className='tex-cell on';
      var cvv=document.createElement('canvas'); cvv.width=44; cvv.height=44; cvv.className='sw';
      var img=getTexImage(tx.id);
      if(img){
        var gg=cvv.getContext('2d');
        var tmp=document.createElement('canvas'); tmp.width=img.w; tmp.height=img.h;
        var idd=tmp.getContext('2d').createImageData(img.w,img.h);
        idd.data.set(img.data); tmp.getContext('2d').putImageData(idd,0,0);
        gg.drawImage(tmp,0,0,44,44);
      }
      var nm=document.createElement('div'); nm.className='nm'; nm.textContent=tx.n;
      cell.appendChild(cvv); cell.appendChild(nm);
      cell.onclick=function(){ FINISH_TEX[key]=tx.id; build(); buildFinishPanel(); };
      grid.appendChild(cell);
    });
    host.appendChild(grid);

    /* import d'image / photo (JPEG, PNG, ou caméra sur mobile) */
    var impLbl=document.createElement('div'); impLbl.className='slbl'; impLbl.style.marginTop='8px';
    impLbl.textContent='Importer une image / photo'; host.appendChild(impLbl);
    var imp=document.createElement('input'); imp.type='file'; imp.accept='image/*';
    imp.className='tex-import';
    imp.onchange=function(e){ importTexture(e.target.files[0], key); };
    host.appendChild(imp);

    /* échelle de répétition */
    var scLbl=document.createElement('div'); scLbl.className='fh'; scLbl.style.marginTop='8px';
    scLbl.innerHTML='<label>Échelle texture</label><span class="u">×'+TEX_SCALE.toFixed(1)+'</span>';
    host.appendChild(scLbl);
    var sc=document.createElement('input'); sc.type='range'; sc.min='0.2'; sc.max='5'; sc.step='0.1';
    sc.value=TEX_SCALE; sc.style.width='100%';
    sc.oninput=function(){ TEX_SCALE=+sc.value; scLbl.querySelector('.u').textContent='×'+TEX_SCALE.toFixed(1); build(); };
    host.appendChild(sc);
  }
}

/* importTexture() : charge un fichier image (JPEG/PNG/photo) et l'enregistre
   comme texture pour l'élément `key`. L'image est redimensionnée en TEX_SIZE². */
function importTexture(file, key){
  if(!file) return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var im=new Image();
    im.onload=function(){
      var S=TEX_SIZE;
      var cv=document.createElement('canvas'); cv.width=S; cv.height=S;
      var g=cv.getContext('2d');
      g.drawImage(im,0,0,S,S);
      var dat=g.getImageData(0,0,S,S);
      var id='import_'+key;
      TEX_IMAGES[id]={data:dat.data, w:S, h:S};
      if(!TEXTURE_DEFS.filter(function(t){return t.id===id;})[0]){
        TEXTURE_DEFS.push({id:id, n:'Image ('+key+')', c:[200,200,200], gen:'import'});
      }
      FINISH_TEX[key]=id;
      build(); buildFinishPanel();
    };
    im.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

/* ----------------------------------------------------------------------------
   NAVIGATION DU CATALOGUE
   - setupTabs()    : branche les onglets principaux (Génériques / Fabricants)
   - buildCatList() : génère la liste des catégories de la branche active
   - refreshView()  : affiche la catégorie courante (objet réel ou placeholder)

/* Branche les onglets principaux Génériques / Fabricants */
function setupTabs(){
  document.querySelectorAll('.tab').forEach(function(tab){
    tab.onclick=function(){
      BRANCH = tab.dataset.branch;
      document.querySelectorAll('.tab').forEach(function(t){
        t.classList.toggle('on', t.dataset.branch===BRANCH);
      });
      /* sélectionne la 1re catégorie de la branche */
      selectCat(CATALOG[BRANCH].cats[0].id);
      buildCatList();
      refreshView();
    };
  });
}

/* Génère la liste cliquable des catégories de la branche active */
function buildCatList(){
  var host=document.getElementById('cat-list');
  host.innerHTML='';
  CATALOG[BRANCH].cats.forEach(function(cat){
    var b=document.createElement('button');
    b.innerHTML = cat.label + (cat.status==='todo' ? '<span class="badge">·</span>' : '');
    if(cat.id===CAT) b.className='on';
    b.title = (cat.status==='todo') ? 'À venir' : '';
    b.onclick=function(){
      selectCat(cat.id);
      buildCatList();
      refreshView();
    };
    host.appendChild(b);

    /* sous-menu : si la catégorie a des produits ET qu'elle est active,
       on liste ses produits en retrait juste en dessous. */
    if(cat.subs && cat.id===CAT){
      var sub=document.createElement('div'); sub.className='subcat-list';
      cat.subs.forEach(function(p){
        var sb=document.createElement('button'); sb.className='subcat-item';
        sb.textContent=p.label;
        if(p.id===AL_PRODUCT) sb.className='subcat-item on';
        sb.onclick=function(){
          AL_PRODUCT=p.id;
          WGL.show(AL_PRODUCT);
          buildCatList(); buildProductUI(); updateDims();
        };
        sub.appendChild(sb);
      });
      host.appendChild(sub);
    }

    /* hub Objets : arborescence mobilier (familles -> [sous-familles] -> produits) */
    if(cat.id==='objets' && cat.id===CAT){
      var tree=document.createElement('div'); tree.className='subcat-list';
      var addItems=function(items, ml){
        var wrap=document.createElement('div'); wrap.className='subcat-list'; wrap.style.marginLeft=ml+'px';
        items.forEach(function(pr){
          var pb=document.createElement('button'); pb.className='subcat-item'+(FURN.prodId===pr.id?' on':'');
          pb.textContent=pr.label;
          pb.onclick=function(){ selectFurnProduct(pr); buildCatList(); refreshView(); };
          wrap.appendChild(pb);
        });
        tree.appendChild(wrap);
      };
      FURNLIB.forEach(function(fam){
        var fb=document.createElement('button'); fb.className='subcat-item'+(FURN.fam===fam.id?' on':'');
        fb.style.fontWeight='700'; fb.textContent=fam.label;
        fb.onclick=function(){ FURN.fam=fam.id; buildCatList(); };
        tree.appendChild(fb);
        if(FURN.fam===fam.id){
          if(fam.items) addItems(fam.items, 8);
          else if(fam.groups){
            fam.groups.forEach(function(g){
              var gb=document.createElement('button'); gb.className='subcat-item'+(FURN.sub===g.id?' on':'');
              gb.style.fontWeight='600'; gb.style.marginLeft='8px'; gb.textContent=g.label;
              gb.onclick=function(){ FURN.sub=g.id; buildCatList(); };
              tree.appendChild(gb);
              if(FURN.sub===g.id) addItems(g.items, 16);
            });
          }
        }
      });
      host.appendChild(tree);
    }
  });
}

/* Affiche la catégorie courante : objet réel (paramètres + rendu) ou placeholder */
function refreshView(){
  DIRTY=true;
  var cat=curCat();
  var ready=(cat.status==='ready');
  var isWall=(cat.id==='mur');
  var isSlab=(cat.id==='dalle');
  var isProduct=(cat.subs && cat.status==='ready');   /* fabricant avec produits importés */
  var isSimpleObj=(cat.id==='poteau'||cat.id==='poutre'||cat.id==='gardecorps');
  var isLayered=(isWall||isSlab||isSimpleObj||isProduct);   /* objets sans bloc Finition meuble */
  /* contrôles objet visibles seulement si la catégorie est prête */
  document.getElementById('obj-controls').style.display = ready ? '' : 'none';
  /* sélecteur de forme seulement dans la catégorie Forme */
  document.getElementById('shape-sel').style.display = (ready && cat.id==='forme') ? '' : 'none';
  /* slider portes seulement pour le meuble (catégorie Objet) */
  var doorRow=document.getElementById('door-row');
  if(doorRow) doorRow.style.display = (ready && cat.id==='objet') ? '' : 'none';
  /* le bloc Finition (couleurs corps/étagères) ne concerne pas mur ni dalle */
  var finElems=document.getElementById('finish-elems');
  var finPanel=document.getElementById('finish-panel');
  var finLbl=finElems ? finElems.previousElementSibling : null;
  /* Le bloc Finition (RAL + matieres) est desormais disponible pour TOUS les objets
     parametriques. Seuls les produits fabricants (rendu WebGL) n'en ont pas. */
  var showFinish = ready;   /* Finition disponible pour TOUS les objets prets, fabricants inclus */
  [finElems, finPanel, finLbl].forEach(function(el){ if(el) el.style.display = showFinish ? '' : 'none'; });

  /* message placeholder pour les catégories à venir */
  var todo=document.getElementById('todo-msg');
  if(ready){
    todo.style.display='none';
  } else {
    todo.style.display='';
    todo.innerHTML='<span class="big">⌂</span>'+cat.label+'<br><span style="font-size:10px;">à venir — catégorie en préparation</span>';
  }

  if(ready){
    if(isProduct){
      /* objet fabricant : rendu WebGL (géométrie complète, PBR) */
      DIMS = {w:1,h:1,d:1};   /* placeholder, le WebGL gère sa propre caméra */
      WGL.show(AL_PRODUCT);
      buildProductUI();
      buildFinishUI();   /* panneau Teinte (RAL) pour les produits fabricants */
      updateDims();
    } else {
      WGL.hide();
      var r=build();                    /* construit d'abord (calcule DIMS) */
      fitCamera(r || DIMS);             /* cadre automatiquement le nouvel objet */
      if(isWall){ buildWallUI(); }
      else if(isSlab){ buildSlabUI(); }
      else if(cat.id==='poteau'){ buildPosteUI(); }
      else if(cat.id==='poutre'){ buildPoutreUI(); }
      else if(cat.id==='gardecorps'){ buildRailUI(); }
      else if(cat.id==='porte'){ buildPorteUI(); }
      else if(cat.id==='fenetre'){ buildFenetreUI(); }
      else if(cat.id==='murrideau'){ buildMurRideauUI(); }
      else if(cat.id==='objets'){ buildFurnUI(); }
      else { buildUI(); }
      buildFinishUI();   /* panneau Finition pour tous les objets parametriques */
      updateDims();
    }
  } else {
    WGL.hide();
  }
}
